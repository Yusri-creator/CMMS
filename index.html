function _esc(s){return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function _pad(n){return String(n).padStart(2,'0');}

function dmUpdate(idx,key,val){
  dmRows[idx][key]=val;
  dmUpdateSummary();
}
function dmSetTime(idx,which,val){
  if(!val){
    if(which==='start'){dmRows[idx].startH='';dmRows[idx].startM='';}
    else{dmRows[idx].stopH='';dmRows[idx].stopM='';}
  } else {
    const [h,m]=val.split(':').map(Number);
    if(which==='start'){dmRows[idx].startH=h;dmRows[idx].startM=m;}
    else{dmRows[idx].stopH=h;dmRows[idx].stopM=m;}
  }
  const el=document.getElementById('dm-dur-'+idx);
  if(el){ const raw=dmCalcDurasi(dmRows[idx]); el.textContent=raw==='—'?'—':fmtDurasiMnt(parseMnt(raw)); }
  dmUpdateSummary();
}
function dmSetStatus(idx,status,btn){
  dmRows[idx].status=status;
  btn.closest('.d-status-group').querySelectorAll('.d-status-btn').forEach(b=>{
    b.className='d-status-btn';
    if(b===btn) b.classList.add(status.toLowerCase());
  });
  dmUpdateSummary();
}

function dmGetTeknisiList(){

function dmAutoTeam(){

    dmRows.forEach(r=>{ r.teknisi='Chairul'; });

function dmSetTeam(){

  const team=sel?sel.value:'';
  let members=[];
  if(team==='A') members=[...TEAM_A];

  const teamStr=members.join(', ');

  }).join('');
  // Render absent checkboxes
  const wrap=document.getElementById('dm-absent-wrap');
  const checks=document.getElementById('dm-absent-checks');
  if(wrap&&checks&&displayMembers.length){
    wrap.style.display='block';
    checks.innerHTML=displayMembers.map(m=>`
      <label style="display:inline-flex;align-items:center;gap:5px;cursor:pointer;font-size:.75rem;color:${dmAbsent.has(m)?'#fca5a5':'#94a3b8'};background:${dmAbsent.has(m)?'rgba(127,29,29,.2)':'rgba(30,41,59,.5)'};border:1px solid ${dmAbsent.has(m)?'rgba(127,29,29,.4)':'#334155'};border-radius:6px;padding:4px 9px;transition:all .15s">
        <input type="checkbox" ${dmAbsent.has(m)?'checked':''} onchange="dmToggleAbsent('${m}',this.checked)" style="accent-color:#f87171;cursor:pointer"/>

  // Set default teknisi
  const defaultTeknisi=shift==='Pagi'?'Chairul':(members.find(n=>!dmAbsent.has(n))||'');
  dmRows.forEach(r=>{ if(!r.teknisi||dmAbsent.has(r.teknisi)) r.teknisi=defaultTeknisi; });
  if(shift==='Pagi') dmRows.forEach(r=>{ r.teknisi='Chairul'; });

function dmCheckCarry(){
  const tanggal=document.getElementById('dm-tanggal')?document.getElementById('dm-tanggal').value:'';
  if(!tanggal) return;
  const carry=dmLog.filter(r=>
    (r.status==='Lanjut'||r.status==='Pending') &&
    r.tanggal && r.tanggal<tanggal &&
    !r.carriedOver
  );
  const banner=document.querySelector('.d-carry-banner');
  if(banner) banner.style.display=carry.length?'flex':'none';
}
function dmLoadCarry(){
  const tanggal=document.getElementById('dm-tanggal')?document.getElementById('dm-tanggal').value:'';
  const carry=dmLog.filter(r=>
    (r.status==='Lanjut'||r.status==='Pending') &&
    r.tanggal && r.tanggal<tanggal &&
    !r.carriedOver
  );
  if(!carry.length){showToastMsg('Tidak ada job Lanjut/Pending yang perlu dimuat');return;}
  carry.forEach(r=>{
    const linked=r.linkedCaseId||(history.find(h=>h.fromDaily&&h.mesinId===r.mesin&&h.keterangan&&h.keterangan.startsWith(r.job))||{}).caseId||'';
    dmRows.unshift(dmNewRow({
      mesin:r.mesin,mesinManual:r.mesinManual||'',isManualMesin:r.isManualMesin||false,
      job:r.job,problem:r.problem,ket:r.ket,kat:r.kat,teknisi:r.teknisi,
      status:'Lanjut',isCarry:true,linkedCaseId:linked
    }));
    // Tandai record lama sudah dimuat agar tidak muncul lagi di banner
    const idx=dmLog.indexOf(r);
    if(idx>=0) dmLog[idx]={...dmLog[idx],carriedOver:true};
  });
  saveDmLog();
  dmRenderCards();
  dmCheckCarry();
  showToastMsg(`✅ ${carry.length} job carry-over dimuat!`);
}
function dmClearForm(){
  dmRows=[];

  dmRenderCards();
  ['dm-notes'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
}

// ── SAVE & SYNC ───────────────────────────────────────────────────────────────
function dmSaveToLog(){
  const tanggal=document.getElementById('dm-tanggal')?document.getElementById('dm-tanggal').value:'';
  const shift=document.getElementById('dm-shift')?document.getElementById('dm-shift').value:'';
  const team=document.getElementById('dm-team')?document.getElementById('dm-team').value:'';
  const prepared=document.getElementById('dm-prepared')?document.getElementById('dm-prepared').value:'';
  const valid=dmRows.filter(r=>r.job.trim());
  if(!valid.length){showToastMsg('⚠️ Tidak ada baris yang terisi!');return;}
  const hari=tanggal?new Date(tanggal+' 00:00').toLocaleDateString('id-ID',{weekday:'long'}):'';

  let syncCount=0;
  valid.forEach(row=>{
    // Tentukan nama mesin yang disimpan
    const mesinNama = row.isManualMesin ? (row.mesinManual||'').trim() : row.mesin;
    const entry={
      id:Date.now()+Math.random(),tanggal,hari,shift,
      mesin:mesinNama,isManualMesin:row.isManualMesin||false,
      job:row.job,problem:row.problem,ket:row.ket,
      startH:row.startH,startM:row.startM,stopH:row.stopH,stopM:row.stopM,
      durasi:dmCalcDurasi(row),kat:row.kat,status:row.status,
      teknisi:row.teknisi||team,prepared,savedAt:new Date().toISOString()
    };
    dmLog.push(entry);

    // ── Sync otomatis ke History CMMS ──────────────────────────────
    // Mesin manual (tidak terdata) → SKIP, tidak buat History Card
    if(row.isManualMesin) return;
    if(!row.mesin||!row.mesin.trim()) return;
    const machine=machines.find(m=>m.id.toLowerCase().trim()===row.mesin.trim().toLowerCase());
    if(!machine) return;

    const katMap={'Corrective':'CORRECTIVE','Preventive':'PREVENTIVE','Fabrication':'CORRECTIVE','Support':'CORRECTIVE','Cleaning':'PREVENTIVE'};
    const statusMap={'OK':'Selesai','Lanjut':'Proses','Pending':'Pending','Cancel':'Selesai','':'Proses'};
    const tipeKerja=katMap[row.kat]||'CORRECTIVE';
    const newStatus=statusMap[row.status]||'Proses';
    const timeStart=row.startH!==''?_pad(row.startH)+':'+_pad(row.startM||0):'';
    const timeFinish=row.stopH!==''?_pad(row.stopH)+':'+_pad(row.stopM||0):'';
    let addDowntime=0;
    if(timeStart&&timeFinish){
      const [sh,sm]=timeStart.split(':').map(Number);
      const [eh,em]=timeFinish.split(':').map(Number);
      const diff=(eh*60+em)-(sh*60+sm);
      if(diff>0) addDowntime=diff;
    }

    // Cari History Card yang sudah ada:
    // 1. Dari linkedCaseId (carry-over sudah tersambung)
    // 2. History fromDaily mesin+tipe sama yang masih Proses/Pending
    const targetCaseId = row.linkedCaseId ||
      (history.find(h=>
        h.fromDaily &&
        h.mesinId===machine.id &&
        h.tipeKerja===tipeKerja &&
        (h.status==='Proses'||h.status==='Pending')
      )||{}).caseId || '';

    if(targetCaseId){
      // UPDATE History Card yang sudah ada
      history=history.map(h=>{
        if(h.caseId!==targetCaseId) return h;
        const newKet=row.job+(row.problem?' | Problem: '+row.problem:'')+(row.ket?' | '+row.ket:'');
        const updKet=(h.keterangan&&h.keterangan.includes(newKet))?h.keterangan:h.keterangan+(newKet?'\n'+newKet:'');
        const updDT=(h.downtime||0)+addDowntime;
        const updTF=timeFinish||h.timeFinish;
        const updTglSelesai=newStatus==='Selesai'?tanggal:(h.tanggalSelesai||'');
        return{...h,status:newStatus,downtime:updDT,timeFinish:updTF,
               tanggalSelesai:updTglSelesai,keterangan:updKet.trim(),
               teknisi:row.teknisi||h.teknisi};
      });
      entry.linkedCaseId=targetCaseId;
      if(newStatus==='Selesai') machines=machines.map(m=>m.id===machine.id?{...m,status:'OK'}:m);
      else if(newStatus==='Proses'||newStatus==='Pending') machines=machines.map(m=>m.id===machine.id?{...m,status:'REPAIR'}:m);
      syncCount++;
      return;
    }

    // Tidak ada card open → buat History Card baru
    const caseId=nextCaseId();
    const rec={
      caseId,tanggal,mesinId:machine.id,merk:machine.merk||'',area:machine.area||'',
      tipeKerja,jenisKerusakan:'',areaKerusakan:'',detailKerusakan:[],
      keterangan:row.job+(row.problem?' | Problem: '+row.problem:'')+(row.ket?' | '+row.ket:''),
      teknisi:row.teknisi||team,shift:shift||'Tidak Diketahui',
      timeStart,timeFinish,tanggalSelesai:newStatus==='Selesai'?tanggal:'',downtime:addDowntime,
      pmId:'',partNama:'',partSupplier:'',partTglOrder:'',partEta:'',partQty:'',fotos:[],
      status:newStatus,fromDaily:true,dailyKat:row.kat||''
    };
    if(rec.status==='Proses'||rec.status==='Pending') machines=machines.map(m=>m.id===machine.id?{...m,status:'REPAIR'}:m);
    entry.linkedCaseId=caseId;
    history=[...history,rec];
    syncCount++;
  });

  saveDmLog();
  if(syncCount>0){ save('machines',machines); save('history',history); }
  const updCount=valid.filter(r=>r.linkedCaseId&&!r.isManualMesin&&r.mesin).length;
  const newCount=syncCount-updCount;
  let msg=`✅ ${valid.length} baris disimpan`;
  if(newCount>0) msg+=` · 🆕 ${newCount} History Card baru`;
  if(updCount>0) msg+=` · 🔄 ${updCount} History Card diupdate`;
  showToastMsg(msg);
}

// ── DATA LOG ─────────────────────────────────────────────────────────────────
let _dmExpandedDays = new Set(); // track which day-shift cards are expanded

function dmRenderLog(el,resetPage){
  if(resetPage){dmLogPage=0;}
  const q=(document.getElementById('dm-filter-q')||{}).value||'';
  const fs=(document.getElementById('dm-filter-status')||{}).value||'';
  const fk=(document.getElementById('dm-filter-kat')||{}).value||'';
  const fd=(document.getElementById('dm-filter-date')||{}).value||'';
  const fm=(document.getElementById('dm-filter-month')||{}).value||'';
  let data=[...dmLog].sort((a,b)=>(b.tanggal||'').localeCompare(a.tanggal||''));
  if(fs) data=data.filter(r=>r.status===fs);
  if(fk) data=data.filter(r=>r.kat===fk);
  if(fd) data=data.filter(r=>r.tanggal===fd);
  if(fm) data=data.filter(r=>(r.tanggal||'').startsWith(fm));
  if(q){const ql=q.toLowerCase();data=data.filter(r=>[r.job,r.mesin,r.problem,r.ket,r.teknisi].join(' ').toLowerCase().includes(ql));}

  const allMonths=[...new Set(dmLog.map(r=>(r.tanggal||'').slice(0,7)).filter(Boolean))].sort().reverse();
  const stColor={OK:'#6ee7b7',Lanjut:'#fcd34d',Pending:'#fca5a5',Cancel:'#94a3b8'};
  const stBg={OK:'rgba(6,78,59,.3)',Lanjut:'rgba(120,53,15,.3)',Pending:'rgba(127,29,29,.3)',Cancel:'rgba(51,65,85,.3)'};

  // ── Kelompokkan per tanggal → per shift ─────────────────────────────────
  // dayMap: { '2026-06-12': { Pagi:[...], Malam:[...], '':[...] } }
  const dayMap = {};

    const tgl = r.tanggal||'?';
    if(!dayMap[tgl]) dayMap[tgl]={};
    const sh = r.shift||'—';
    if(!dayMap[tgl][sh]) dayMap[tgl][sh]=[];
    dayMap[tgl][sh].push(r);

  const sortedDays = Object.keys(dayMap).sort().reverse();

  // Pagination per hari (bukan per record)
  const DM_DAYS_PER_PAGE = 10;
  const totalPages = Math.max(1,Math.ceil(sortedDays.length/DM_DAYS_PER_PAGE));
  if(dmLogPage>=totalPages) dmLogPage=totalPages-1;
  const pageDays = sortedDays.slice(dmLogPage*DM_DAYS_PER_PAGE,(dmLogPage+1)*DM_DAYS_PER_PAGE);
  const from = sortedDays.length?dmLogPage*DM_DAYS_PER_PAGE+1:0;

  // ── Render day cards ─────────────────────────────────────────────────────

    const shiftsInDay = dayMap[tgl];
    const shiftOrder = ['Pagi','Malam','—'];
    // total records hari ini
    const totalDay = Object.values(shiftsInDay).reduce((a,arr)=>a+arr.length,0);
    const allDayRows = Object.values(shiftsInDay).flat();
    const okDay = allDayRows.filter(r=>r.status==='OK').length;
    const lanjutDay = allDayRows.filter(r=>r.status==='Lanjut').length;
    const pendingDay = allDayRows.filter(r=>r.status==='Pending').length;
    const totalDurDay = allDayRows.reduce((a,r)=>a+parseMnt(r.durasi),0);
    const hariLabel = new Date(tgl+' 00:00').toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'short',year:'numeric'});
    const shiftKeys = shiftOrder.filter(s=>shiftsInDay[s]).concat(Object.keys(shiftsInDay).filter(s=>!shiftOrder.includes(s)));

    return `<div style="border:1.5px solid rgba(34,211,238,.2);border-radius:12px;margin-bottom:10px;overflow:hidden;background:rgba(15,23,42,.5)">
      <!-- Day Header -->
      <div onclick="dmToggleDay('${dayKey}')" style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(8,145,178,.08);cursor:pointer;user-select:none;border-bottom:1px solid rgba(51,65,85,.3)">
        <span style="font-size:1.1rem">📅</span>
        <div style="flex:1">
          <div style="font-weight:900;font-size:.85rem;color:#22d3ee">${hariLabel}</div>
          <div style="font-size:.65rem;color:#64748b;margin-top:1px">${shiftKeys.length} shift · ${totalDay} job${totalDurDay>0?' · ⏱'+fmtDurasiMnt(totalDurDay):''}</div>
        </div>
        <div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap;justify-content:flex-end">
          ${okDay?`<span style="font-size:.65rem;background:rgba(6,78,59,.3);color:#6ee7b7;border-radius:4px;padding:2px 7px;font-weight:700">✅ ${okDay}</span>`:''}
          ${lanjutDay?`<span style="font-size:.65rem;background:rgba(120,53,15,.3);color:#fcd34d;border-radius:4px;padding:2px 7px;font-weight:700">🔄 ${lanjutDay}</span>`:''}
          ${pendingDay?`<span style="font-size:.65rem;background:rgba(127,29,29,.3);color:#fca5a5;border-radius:4px;padding:2px 7px;font-weight:700">⏳ ${pendingDay}</span>`:''}

      <span style="font-size:.7rem;color:#94a3b8">${dmLogPage+1}/${totalPages}</span>
      ${pagerBtn('›',Math.min(totalPages-1,dmLogPage+1),dmLogPage===totalPages-1)}
      ${pagerBtn('»',totalPages-1,dmLogPage===totalPages-1)}
    </div>`:''}
  </div>
  ${dayCardsHtml}
  ${sortedDays.length>DM_DAYS_PER_PAGE?`<div style="display:flex;gap:4px;justify-content:center;padding:8px 0">
    ${pagerBtn('«',0,dmLogPage===0)}
    ${pagerBtn('‹ Prev',Math.max(0,dmLogPage-1),dmLogPage===0)}
    <span style="font-size:.7rem;color:#94a3b8;align-self:center">Hal ${dmLogPage+1}/${totalPages}</span>
    ${pagerBtn('Next ›',Math.min(totalPages-1,dmLogPage+1),dmLogPage===totalPages-1)}
    ${pagerBtn('»',totalPages-1,dmLogPage===totalPages-1)}
  </div>`:''}`;
}

function dmToggleDay(dayKey){
  if(_dmExpandedDays.has(dayKey)) _dmExpandedDays.delete(dayKey);
  else { _dmExpandedDays.add(dayKey); }
  dmRenderLog(document.getElementById('dm-content'));
}
function dmToggleShift(shiftKey){
  if(_dmExpandedDays.has(shiftKey)) _dmExpandedDays.delete(shiftKey);
  else _dmExpandedDays.add(shiftKey);
  dmRenderLog(document.getElementById('dm-content'));
}
function dmDelLog(idx){
  if(!confirm('Hapus record ini?')) return;
  dmLog.splice(idx,1);
  saveDmLog();
  dmRenderLog(document.getElementById('dm-content'));
}

function dmApplyShiftBulk(idxList){
  const shift=document.getElementById('bulk-shift').value;
  if(!shift){showToastMsg('⚠️ Pilih shift terlebih dahulu');return;}
  idxList.forEach(idx=>{
    if(dmLog[idx]) dmLog[idx]={...dmLog[idx],shift};
  });
  saveDmLog();
  showToast(`✅ Shift ${shift} diterapkan ke ${idxList.length} job`);
  closeModal();
  dmRenderLog(document.getElementById('dm-content'));
}
function dmSaveEdit(idx){
  const r=dmLog[idx];if(!r)return;
  const wasLanjutPending=(r.status==='Lanjut'||r.status==='Pending');
  const nowDone=(newStatus==='OK'||newStatus==='Cancel');
  dmLog[idx]={
    ...r,
    mesin:document.getElementById('de-mesin').value||r.mesin,
    job:document.getElementById('de-job').value,
    problem:document.getElementById('de-problem').value,
    ket:document.getElementById('de-ket').value,
    kat:document.getElementById('de-kat').value,
    status:newStatus,
    teknisi:document.getElementById('de-teknisi').value,
    shift:document.getElementById('de-shift').value,
    startH:sh!==''?parseInt(sh):r.startH,
    startM:parseInt(sm||0),
    stopH:eh!==''?parseInt(eh):r.stopH,
    stopM:parseInt(em||0),
    durasi,
    carriedOver:(wasLanjutPending&&nowDone)?true:(r.carriedOver||false),
  };
  saveDmLog();
  showToast('✅ Aktivitas diperbarui');
  closeModal();
  dmRenderLog(document.getElementById('dm-content'));
  // Re-check carry banner jika user kembali ke form
  dmCheckCarry();
}

      const dur=katDur[k]||0;
      return`<div class="bar-row" style="margin-bottom:8px"><div class="bar-label"><span>${k}</span><span style="color:#64748b">${cnt}x · <span style="color:#22d3ee">${fmtDurasiMnt(dur)}</span></span></div><div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:#7c3aed"></div></div></div>`;
    }).join('')}

function dmFilterPeriod(data){
  const t=today();const now=new Date();
  if(dmPeriod==='all') return data;
  if(dmPeriod==='week'){const d=now.getDay(),mon=new Date(now);mon.setDate(now.getDate()-d+1);const ms=mon.toISOString().slice(0,10);return data.filter(r=>r.tanggal>=ms&&r.tanggal<=t);}
  if(dmPeriod==='month'){const m=t.slice(0,7);return data.filter(r=>(r.tanggal||'').startsWith(m));}
  if(dmPeriod==='last30'){const d30=new Date(now);d30.setDate(now.getDate()-30);return data.filter(r=>r.tanggal>=(d30.toISOString().slice(0,10)));}
  return data;
}

function dmBuildLaporanTeks(tgl, fmt){
  const data=dmLog.filter(r=>r.tanggal===tgl).sort((a,b)=>(a.shift||'').localeCompare(b.shift||''));
  if(!data.length) return '(Tidak ada data untuk tanggal ini)';
  const hariLabel=new Date(tgl+' 00:00').toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const totalDur=data.reduce((a,r)=>a+parseMnt(r.durasi),0);
  const okCount=data.filter(r=>r.status==='OK').length;
  const ljCount=data.filter(r=>r.status==='Lanjut').length;
  const pdCount=data.filter(r=>r.status==='Pending').length;

  // Group by shift
  const shiftMap={};
  data.forEach(r=>{const s=r.shift||'—';if(!shiftMap[s])shiftMap[s]=[];shiftMap[s].push(r);});
  const shiftOrder=['Pagi','Malam'];
  const shifts=[...shiftOrder.filter(s=>shiftMap[s]),...Object.keys(shiftMap).filter(s=>!shiftOrder.includes(s))];

  let txt='';
  txt+=`╔══════════════════════════════╗\n`;
  txt+=`  📋 DAILY MAINTENANCE REPORT\n`;
  txt+=`  PLANT 2A · 2B · 2C\n`;
  txt+=`╚══════════════════════════════╝\n`;
  txt+=`📅 ${hariLabel}\n\n`;

  shifts.forEach(sh=>{
    const rows=shiftMap[sh];
    const durSh=rows.reduce((a,r)=>a+parseMnt(r.durasi),0);
    const prep=rows[0]&&rows[0].prepared?rows[0].prepared:'';
    txt+=`${sh==='Pagi'?'🌅':'🌙'} SHIFT ${sh.toUpperCase()}`;
    if(prep) txt+=` — ${prep}`;
    txt+=`\n${'─'.repeat(32)}\n`;
    rows.forEach((r,i)=>{
      txt+=`${i+1}. [${r.mesin||'?'}] ${r.job||'—'}\n`;
      if(fmt==='lengkap'){
        if(r.problem) txt+=`   ⚠ Problem : ${r.problem}\n`;
        if(r.ket)     txt+=`   📝 Ket    : ${r.ket}\n`;
        if(r.teknisi) txt+=`   👤 Teknisi: ${r.teknisi}\n`;
      }
      const durStr=parseMnt(r.durasi)>0?` ⏱${fmtDurasiMnt(parseMnt(r.durasi))}`:'';
      const stIcon={OK:'✅',Lanjut:'🔄',Pending:'⏳',Cancel:'❌'}[r.status]||'•';
      txt+=`   ${stIcon} ${r.status||'—'}${durStr}`;
      if(r.startH!==''&&r.startH!==undefined) txt+=` · ${String(r.startH).padStart(2,'0')}:${String(r.startM||0).padStart(2,'0')}→${String(r.stopH||'').padStart(2,'0')}:${String(r.stopM||0).padStart(2,'0')}`;
      txt+='\n';
      if(fmt==='lengkap'&&r.kat) txt+=`   📂 ${r.kat}\n`;
    });
    txt+=`  Total: ${rows.length} job · Downtime: ${durSh>0?fmtDurasiMnt(durSh):'—'}\n\n`;
  });

  txt+=`${'═'.repeat(32)}\n`;
  txt+=`📊 RINGKASAN\n`;
  txt+=`  Total job  : ${data.length}\n`;
  txt+=`  ✅ OK       : ${okCount}\n`;
  txt+=`  🔄 Lanjut   : ${ljCount}\n`;
  txt+=`  ⏳ Pending  : ${pdCount}\n`;
  txt+=`  ⏱ Downtime : ${totalDur>0?fmtDurasiMnt(totalDur):'—'}\n`;
  if(ljCount+pdCount>0){
    txt+=`\n⚠️ PERLU TINDAK LANJUT:\n`;
    data.filter(r=>r.status==='Lanjut'||r.status==='Pending').forEach(r=>{
      txt+=`  • [${r.mesin||'?'}] ${r.job||'—'} → ${r.status}\n`;
    });
  }
  txt+=`\n_Dikirim dari CMMS Maintenance_`;
  return txt;
}

function dmPreviewLaporan(){
  const tgl=(document.getElementById('lap-tgl')||{}).value||today();
  const fmt=(document.getElementById('lap-fmt')||{}).value||'ringkas';
  const prev=document.getElementById('lap-preview');
  if(prev) prev.textContent=dmBuildLaporanTeks(tgl,fmt);
}

function dmShareWA(){
  const tgl=(document.getElementById('lap-tgl')||{}).value||today();
  const fmt=(document.getElementById('lap-fmt')||{}).value||'ringkas';
  const teks=dmBuildLaporanTeks(tgl,fmt);
  const url='https://wa.me/?text='+encodeURIComponent(teks);
  window.open(url,'_blank');
}

function dmCopyLaporan(){
  const tgl=(document.getElementById('lap-tgl')||{}).value||today();
  const fmt=(document.getElementById('lap-fmt')||{}).value||'ringkas';
  const teks=dmBuildLaporanTeks(tgl,fmt);
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(teks).then(()=>{
      const ok=document.getElementById('lap-copy-ok');
      if(ok){ok.style.display='block';setTimeout(()=>ok.style.display='none',2500);}
    });
  } else {
    const ta=document.createElement('textarea');ta.value=teks;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    const ok=document.getElementById('lap-copy-ok');
    if(ok){ok.style.display='block';setTimeout(()=>ok.style.display='none',2500);}
  }
}

// ── EXPORT EXCEL ─────────────────────────────────────────────────────────────
function dmExportExcel(){
  if(!dmLog.length){showToastMsg('⚠️ Data Log masih kosong!');return;}
  if(typeof XLSX==='undefined'){showToastMsg('⚠️ Library XLSX tidak tersedia');return;}
  const wb=XLSX.utils.book_new();

  // ── Helper styles ────────────────────────────────────────────────────────
  const sorted=[...dmLog].sort((a,b)=>(a.tanggal||'').localeCompare(b.tanggal||'')||(a.shift||'').localeCompare(b.shift||''));

  // ═══ SHEET 1: LOG HARIAN (grouped by date + shift) ═══════════════════════
  const sheetRows=[];
  // Title
  sheetRows.push(['DAILY MAINTENANCE LOG — PLANT 2A · 2B · 2C']);
  sheetRows.push(['Dicetak:',new Date().toLocaleDateString('id-ID',{weekday:'long',year:'numeric',month:'long',day:'numeric'})]);
  sheetRows.push(['Total Record:',dmLog.length,'record','Total Hari:',new Set(dmLog.map(r=>r.tanggal)).size,'hari']);
  sheetRows.push([]);

  // Group by tanggal → shift
  const dayMap={};
  sorted.forEach(r=>{
    const t=r.tanggal||'?';
    if(!dayMap[t])dayMap[t]={};
    const s=r.shift||'—';
    if(!dayMap[t][s])dayMap[t][s]=[];
    dayMap[t][s].push(r);
  });

  Object.keys(dayMap).sort().forEach(tgl=>{
    const hariLabel=new Date(tgl+' 00:00').toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    const allRows=Object.values(dayMap[tgl]).flat();
    const totalDurHari=allRows.reduce((a,r)=>a+parseMnt(r.durasi),0);
    // ─ Header Hari ─
    sheetRows.push([`📅  ${hariLabel.toUpperCase()}`,``,``,``,``,``,``,`Total: ${allRows.length} job  ·  Durasi: ${fmtDurasiMnt(totalDurHari)}`]);
    // ─ Shift blocks ─
    const shiftOrder=['Pagi','Malam'];
    const allShifts=[...shiftOrder.filter(s=>dayMap[tgl][s]),...Object.keys(dayMap[tgl]).filter(s=>!shiftOrder.includes(s))];
    allShifts.forEach(sh=>{
      const rows=dayMap[tgl][sh];
      const durShift=rows.reduce((a,r)=>a+parseMnt(r.durasi),0);
      const prepName=rows[0]&&rows[0].prepared?rows[0].prepared:'';
      // Shift header row
      sheetRows.push([`  ${sh==='Pagi'?'🌅':'🌙'} SHIFT ${sh.toUpperCase()}`,`Prepared by: ${prepName}`,``,``,``,``,``,`${rows.length} job  ·  ${fmtDurasiMnt(durShift)}`]);
      // Column headers
      sheetRows.push(['','No','No Mesin','Job / Pekerjaan','Problem','Keterangan','Kategori','Start','Stop','Durasi','Status','Teknisi']);
      // Data rows
      rows.forEach((r,i)=>{
        const dur=parseMnt(r.durasi);
        sheetRows.push([
          '',
          i+1,
          r.mesin||'—',
          r.job||'—',
          r.problem||'—',
          r.ket||'—',
          r.kat||'—',
          r.startH!==''&&r.startH!==undefined?String(r.startH).padStart(2,'0')+':'+String(r.startM||0).padStart(2,'0'):'—',
          r.stopH!==''&&r.stopH!==undefined?String(r.stopH).padStart(2,'0')+':'+String(r.stopM||0).padStart(2,'0'):'—',
          dur>0?fmtDurasiMnt(dur):'—',
          r.status||'—',
          r.teknisi||'—'
        ]);
      });
      // Shift summary
      const ok=rows.filter(r=>r.status==='OK').length;
      const lj=rows.filter(r=>r.status==='Lanjut').length;
      const pd=rows.filter(r=>r.status==='Pending').length;
      sheetRows.push(['',`  Ringkasan: ✅ OK:${ok}  🔄 Lanjut:${lj}  ⏳ Pending:${pd}`,``,``,``,``,``,``,``,`Total: ${fmtDurasiMnt(durShift)}`]);
      sheetRows.push([]); // spacer
    });
    sheetRows.push([]); // spacer between days
  });

  const ws1=XLSX.utils.aoa_to_sheet(sheetRows);
  ws1['!cols']=[2,4,12,30,25,28,12,7,7,10,10,16].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb,ws1,'Log Harian');

  // ═══ SHEET 2: RINGKASAN PER HARI ═══════════════════════════════════════
  const sum2=[
    ['RINGKASAN HARIAN — DAILY MAINTENANCE'],
    [''],
    ['Tanggal','Hari','Shift Pagi','Shift Malam','Total Job','✅ OK','🔄 Lanjut','⏳ Pending','Total Durasi','Prepared By']
  ];
  Object.keys(dayMap).sort().forEach(tgl=>{
    const hLabel=new Date(tgl+' 00:00').toLocaleDateString('id-ID',{weekday:'long'});
    const pagiRows=dayMap[tgl]['Pagi']||[];
    const malamRows=dayMap[tgl]['Malam']||[];
    const allR=[...pagiRows,...malamRows,...Object.entries(dayMap[tgl]).filter(([k])=>k!=='Pagi'&&k!=='Malam').flatMap(([,v])=>v)];
    const ok=allR.filter(r=>r.status==='OK').length;
    const lj=allR.filter(r=>r.status==='Lanjut').length;
    const pd=allR.filter(r=>r.status==='Pending').length;
    const dur=allR.reduce((a,r)=>a+parseMnt(r.durasi),0);
    const preps=[...new Set(allR.map(r=>r.prepared).filter(Boolean))].join(', ');
    sum2.push([
      tgl, hLabel,
      pagiRows.length?pagiRows.length+' job':'—',
      malamRows.length?malamRows.length+' job':'—',
      allR.length, ok, lj, pd,
      dur>0?fmtDurasiMnt(dur):'—',
      preps
    ]);
  });
  // Total row
  const allFlat=sorted;
  const totOK=allFlat.filter(r=>r.status==='OK').length;
  const totLJ=allFlat.filter(r=>r.status==='Lanjut').length;
  const totPD=allFlat.filter(r=>r.status==='Pending').length;
  const totDur=allFlat.reduce((a,r)=>a+parseMnt(r.durasi),0);
  sum2.push([]);
  sum2.push(['TOTAL','',`${Object.values(dayMap).reduce((a,d)=>a+(d['Pagi']?d['Pagi'].length:0),0)} job`,`${Object.values(dayMap).reduce((a,d)=>a+(d['Malam']?d['Malam'].length:0),0)} job`,allFlat.length,totOK,totLJ,totPD,fmtDurasiMnt(totDur),'']);
  const ws2=XLSX.utils.aoa_to_sheet(sum2);
  ws2['!cols']=[12,10,12,12,10,8,8,10,14,20].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb,ws2,'Ringkasan Harian');

  // ═══ SHEET 3: REKAP PER MESIN ══════════════════════════════════════════
  const mesinMap={};
  allFlat.forEach(r=>{
    if(!r.mesin)return;
    if(!mesinMap[r.mesin])mesinMap[r.mesin]={jobs:[],durTotal:0,ok:0,lanjut:0,pending:0,cancel:0};
    mesinMap[r.mesin].jobs.push(r);
    mesinMap[r.mesin].durTotal+=parseMnt(r.durasi);
    if(r.status==='OK')mesinMap[r.mesin].ok++;
    else if(r.status==='Lanjut')mesinMap[r.mesin].lanjut++;
    else if(r.status==='Pending')mesinMap[r.mesin].pending++;
    else if(r.status==='Cancel')mesinMap[r.mesin].cancel++;
  });
  const sum3=[
    ['REKAP PER MESIN — DAILY MAINTENANCE'],[''],
    ['No Mesin','Tipe Mesin','Total Job','✅ OK','🔄 Lanjut','⏳ Pending','❌ Cancel','Total Durasi','Rata-rata/Job','Job Terakhir']
  ];
  Object.entries(mesinMap).sort((a,b)=>b[1].jobs.length-a[1].jobs.length).forEach(([id,d])=>{
    const m=machines.find(x=>x.id===id);
    const avg=d.jobs.length?Math.round(d.durTotal/d.jobs.length):0;
    const lastJob=d.jobs[d.jobs.length-1];
    sum3.push([id,m?m.type:'—',d.jobs.length,d.ok,d.lanjut,d.pending,d.cancel,fmtDurasiMnt(d.durTotal),avg>0?fmtDurasiMnt(avg):'—',lastJob?lastJob.tanggal:'—']);
  });
  const ws3=XLSX.utils.aoa_to_sheet(sum3);
  ws3['!cols']=[14,16,10,8,8,10,10,14,14,12].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb,ws3,'Rekap Mesin');

  // ═══ SHEET 4: RAW DATA (untuk filter/pivot sendiri) ═════════════════════
  const raw=[['Tanggal','Hari','Shift','No Mesin','Job / Pekerjaan','Problem','Keterangan','Start','Stop','Durasi (mnt)','Durasi (format)','Kategori','Status','Teknisi','Prepared By']];
  allFlat.forEach(r=>{
    const dur=parseMnt(r.durasi);
    raw.push([
      r.tanggal, r.hari, r.shift||'—', r.mesin||'—',
      r.job||'—', r.problem||'—', r.ket||'—',
      r.startH!==''&&r.startH!==undefined?String(r.startH).padStart(2,'0')+':'+String(r.startM||0).padStart(2,'0'):'—',
      r.stopH!==''&&r.stopH!==undefined?String(r.stopH).padStart(2,'0')+':'+String(r.stopM||0).padStart(2,'0'):'—',
      dur>0?dur:'', dur>0?fmtDurasiMnt(dur):'—',
      r.kat||'—', r.status||'—', r.teknisi||'—', r.prepared||'—'
    ]);
  });
  const ws4=XLSX.utils.aoa_to_sheet(raw);
  ws4['!cols']=[12,10,10,13,30,24,28,8,8,10,12,13,10,18,16].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb,ws4,'Raw Data');

  const fname='DailyMaintenance_'+today()+'.xlsx';
  XLSX.writeFile(wb,fname);
  showToastMsg('✅ Export 4 sheet berhasil!');
}

if('serviceWorker' in navigator){
  const swCode=`
const CACHE='cmms-v2';
const ASSETS=[location.href||'/'];
self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS)).then(()=>self.skipWaiting()));});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))).then(()=>self.clients.claim()));});
self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{if(res&&res.status===200){const c=res.clone();caches.open(CACHE).then(cache=>cache.put(e.request,c));}return res;}).catch(()=>caches.match(e.request))));});
`;
  const blob=new Blob([swCode],{type:'application/javascript'});
  const swUrl=URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}

// Storage: localStorage key 'cmmsDoks' → [{id,mesinId,nama,tag,type,data,link,ukuran,uploadAt,uploadBy}]
// type: 'foto' | 'link'

const DOK_TAGS=['Wiring','Mekanik','SOP','Part Drawing','Nameplate','Manual','K3','Lainnya'];
const DOK_STORAGE_KEY='cmmsDoks';

function getDoks(filter){
  const all=JSON.parse(localStorage.getItem(DOK_STORAGE_KEY)||'[]');
  if(!filter) return all;
  if(filter.mesinId) return all.filter(d=>d.mesinId===filter.mesinId);
  if(filter.tipe||filter.merk) return all.filter(d=>!d.mesinId&&d.tipe===filter.tipe&&d.merk===filter.merk);
  return all;
}
function getDoksForMesin(m){
  const all=JSON.parse(localStorage.getItem(DOK_STORAGE_KEY)||'[]');
  const spesifik=all.filter(d=>d.mesinId===m.id);
  const umum=all.filter(d=>!d.mesinId&&d.tipe===m.type&&d.merk===m.merk);
  return{spesifik,umum,total:spesifik.length+umum.length};
}
function saveDoks(arr){
  localStorage.setItem(DOK_STORAGE_KEY,JSON.stringify(arr));
  // Sync ke Firestore (tanpa data foto base64 agar hemat kuota)
  if(_currentUser && db){
    const slim=arr.map(d=>d.type==='foto'?{...d,data:undefined}:d);
    fsSet('doks',slim).catch(e=>console.warn('doks sync err',e));
  }
}
function delDok(id){ saveDoks(JSON.parse(localStorage.getItem(DOK_STORAGE_KEY)||'[]').filter(d=>d.id!==id)); }

    tipe:m.type,merk:m.merk,scope,nama,tag,
    keterangan:ket,nomor,revisi,

  const dokId='DOK-'+Date.now();

    id:dokId,
    mesinId:isUmum?null:mesinId,

    keterangan:ket,nomor,revisi,
    type:isFoto?'foto':'link',
    data:isFoto?window._dokCompressed:null,
    link:isFoto?null:linkUrl,
    ukuran:isFoto?(window._dokSize||0):0,
    uploadAt:new Date().toISOString()
  };
  const doSaveAll=(entry)=>{
    const all=JSON.parse(localStorage.getItem(DOK_STORAGE_KEY)||'[]');

function dokPreviewFile(e){const f=e.target.files[0];if(f)dokProcessFile(f);}
function dokOnDrop(e){e.preventDefault();e.currentTarget.style.borderColor='#334155';const f=e.dataTransfer.files[0];if(f)dokProcessFile(f);}
function dokProcessFile(file){
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=800;let w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const compressed=canvas.toDataURL('image/jpeg',0.75);
      window._dokCompressed=compressed;window._dokSize=Math.round(compressed.length*0.75);
      const prev=document.getElementById('dok-preview');
      const prevImg=document.getElementById('dok-prev-img');
      const dz=document.getElementById('dok-dropzone');
      if(prev&&prevImg){prev.style.display='block';prevImg.src=compressed;}
      if(dz)dz.style.display='none';
      const info=document.getElementById('dok-prev-info');
      if(info)info.textContent=`${w}×${h}px · ${(window._dokSize/1024).toFixed(0)} KB`;
    };img.src=ev.target.result;
  };reader.readAsDataURL(file);
}

let _gsTab='all';
let _gsQuery='';

function openGlobalSearch(){
  const el=document.getElementById('gs-overlay');

function closeGlobalSearch(){

}
function gsSetTab(tab){

    document.getElementById('gs-tab-'+t).classList.toggle('active',t===tab);

}

function gsHL(text,q){
  if(!q||!text) return text||'';
  const s=String(text);
  if(!q.trim()) return s;
  const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return s.replace(re,'<span class="gs-hl">$1</span>');
}

function gsSearch(q){
  _gsQuery=q;
  const ql=q.toLowerCase().trim();
  const el=document.getElementById('gs-results');
  const results=[];

  // ── History ──────────────────────────────────────────────────────────────
  if(_gsTab==='all'||_gsTab==='history'){
    history.filter(h=>{
      if(!ql) return true;
      return [h.caseId,h.mesinId,h.mesin,h.keterangan,h.problem,h.detail,h.teknisi,h.area,h.tipeKerja,h.status,h.tanggal]
        .join(' ').toLowerCase().includes(ql);
    }).slice(0,_gsTab==='all'?5:30).forEach(h=>{
      const stColor={Selesai:'#6ee7b7',Proses:'#fbbf24',Pending:'#fca5a5',Cancel:'#94a3b8'};
      results.push({
        src:'history', srcLabel:'📋 History', srcColor:'#0891b2',
        title:`${h.caseId} — ${h.mesinId||h.mesin||'?'}`,
        sub:`${h.tanggal||''}  ·  ${h.tipeKerja||''}  ·  ${h.keterangan||''}${h.problem?' · '+h.problem:''}${h.teknisi?' · 👤'+h.teknisi:''}`,
        status:h.status, statusColor:stColor[h.status]||'#94a3b8',
        onclick:`closeGlobalSearch();nav('history');setTimeout(()=>{histQ='${(h.caseId||'').replace(/'/g,"\\'")}';histPage=0;renderHistory();},100)`
      });
    });
  }

  // ── Daily Log ─────────────────────────────────────────────────────────────
  if(_gsTab==='all'||_gsTab==='daily'){
    const dl=JSON.parse(localStorage.getItem('cmmsL_dmlog')||'[]');
    dl.filter(r=>{
      if(!ql) return true;
      return [r.mesin,r.job,r.problem,r.ket,r.teknisi,r.shift,r.tanggal,r.status,r.kat]
        .join(' ').toLowerCase().includes(ql);
    }).sort((a,b)=>(b.tanggal||'').localeCompare(a.tanggal||'')).slice(0,_gsTab==='all'?5:40).forEach(r=>{
      const stColor={OK:'#6ee7b7',Lanjut:'#fcd34d',Pending:'#fca5a5',Cancel:'#94a3b8'};
      results.push({
        src:'daily', srcLabel:'📝 Daily Log', srcColor:'#7c3aed',
        title:`${r.mesin||'?'} — ${r.job||'—'}`,
        sub:`${r.tanggal||''} · ${r.shift||''} · ${r.kat||''}${r.problem?' · '+r.problem:''}${r.teknisi?' · 👤'+r.teknisi:''}${r.durasi&&r.durasi!=='—'?' · ⏱'+fmtDurasiMnt(parseMnt(r.durasi)):''}`,
        status:r.status, statusColor:stColor[r.status]||'#94a3b8',
        onclick:`closeGlobalSearch();nav('daily');setTimeout(()=>{const c=document.getElementById('dm-content');if(c){_dmExpandedDays.clear();const dk='day-'+'${r.tanggal||''}';_dmExpandedDays.add(dk);_dmExpandedDays.add(dk+'-'+'${r.shift||''}');dmRenderLog(c);}},150)`
      });
    });
  }

  // ── Mesin ─────────────────────────────────────────────────────────────────
  if(_gsTab==='all'||_gsTab==='mesin'){
    machines.filter(m=>{
      if(!ql) return true;
      return [m.id,m.type,m.area,m.merk,m.status,m.kap].join(' ').toLowerCase().includes(ql);
    }).slice(0,_gsTab==='all'?5:50).forEach(m=>{
      const st=m.status||'OK';
      const histCount=history.filter(h=>h.mesinId===m.id).length;
      results.push({
        src:'mesin', srcLabel:'⚙️ Mesin', srcColor:'#059669',
        title:`${m.id} — ${m.type}`,
        sub:`Area ${m.area} · ${m.merk||'—'} · ${histCount}x kerusakan`,
        status:st, statusColor:st==='OK'?'#6ee7b7':'#fca5a5',
        onclick:`closeGlobalSearch();nav('mesin');setTimeout(()=>{mesinQ='${m.id}';renderMesin();},100)`
      });
    });
  }

  // ── PM ────────────────────────────────────────────────────────────────────
  if(_gsTab==='all'||_gsTab==='pm'){
    const pmData=JSON.parse(localStorage.getItem('cmmsPM')||'[]');
    pmData.filter(p=>{
      if(!ql) return true;
      return [p.mesinId,p.task,p.freq,p.pic,p.lastDone,p.nextDue].join(' ').toLowerCase().includes(ql);
    }).slice(0,_gsTab==='all'?4:30).forEach(p=>{
      const overdue=p.nextDue&&p.nextDue<today();
      results.push({
        src:'pm', srcLabel:'🔧 PM', srcColor:'#d97706',
        title:`${p.mesinId||'?'} — ${p.task||'—'}`,
        sub:`${p.freq||''} · Due: ${p.nextDue||'—'} · PIC: ${p.pic||'—'}`,
        status:overdue?'Terlambat':'Terjadwal', statusColor:overdue?'#fca5a5':'#6ee7b7',
        onclick:`closeGlobalSearch();nav('preventive')`
      });
    });
  }

  // ── Stok ──────────────────────────────────────────────────────────────────
  if(_gsTab==='all'||_gsTab==='stok'){
    const spData=JSON.parse(localStorage.getItem('cmmsSP')||'[]');
    spData.filter(s=>{
      if(!ql) return true;
      return [s.nama,s.kode,s.kategori,s.lokasi,s.mesin].join(' ').toLowerCase().includes(ql);
    }).slice(0,_gsTab==='all'?4:30).forEach(s=>{
      const kritis=s.stok<=s.minimum;
      results.push({
        src:'stok', srcLabel:'📦 Stok', srcColor:'#ea580c',
        title:`${s.nama||'?'}${s.kode?' ('+s.kode+')':''}`,
        sub:`Stok: ${s.stok||0} ${s.satuan||''} · Min: ${s.minimum||0} · ${s.lokasi||'—'}${s.mesin?' · Mesin: '+s.mesin:''}`,
        status:kritis?'Kritis':'OK', statusColor:kritis?'#fca5a5':'#6ee7b7',
        onclick:`closeGlobalSearch();nav('sparepart')`
      });
    });
  }

  // ── Dokumen ───────────────────────────────────────────────────────────────
  if(_gsTab==='all'||_gsTab==='dokumen'){
    const doks=JSON.parse(localStorage.getItem(DOK_STORAGE_KEY)||'[]');
    doks.filter(d=>{
      if(!ql) return true;
      return [d.nama,d.tag,d.keterangan,d.mesinId,d.link].join(' ').toLowerCase().includes(ql);
    }).slice(0,_gsTab==='all'?4:40).forEach(d=>{
      results.push({
        src:'dokumen', srcLabel:'📁 Dokumen', srcColor:'#7c3aed',
        title:`${d.mesinId} — ${d.nama||'?'}`,
        sub:`${d.tag||'Lainnya'} · ${d.type==='foto'?'Foto · '+((d.ukuran||0)/1024).toFixed(0)+' KB':'Link: '+(d.link||'—')}${d.keterangan?' · '+d.keterangan:''}`,
        status:d.type==='foto'?'Foto':'Link',
        statusColor:d.type==='foto'?'#22d3ee':'#c4b5fd',
        onclick:`closeGlobalSearch();openDokumenMesin('${d.mesinId}')`
      });
    });
  }

  // ── Render results ────────────────────────────────────────────────────────
  if(!ql&&_gsTab==='all'){
    el.innerHTML=`<div style="text-align:center;padding:40px 20px;color:#475569">
      <div style="font-size:2.5rem;margin-bottom:8px">🔍</div>
      <div style="font-size:.85rem">Ketik untuk mencari di seluruh data</div>
      <div style="font-size:.7rem;margin-top:4px;color:#334155">History · Daily Log · Mesin · PM · Stok</div>
    </div>`;
    return;
  }
  if(!results.length){
    el.innerHTML=`<div style="text-align:center;padding:40px 20px;color:#475569">
      <div style="font-size:2rem;margin-bottom:8px">😕</div>
      <div style="font-size:.85rem">Tidak ada hasil untuk "<strong style="color:#e2e8f0">${q}</strong>"</div>
    </div>`;
    return;
  }

  // Group by source
  const groups={};
  results.forEach(r=>{ if(!groups[r.src]) groups[r.src]=[]; groups[r.src].push(r); });
  let html='';
  if(ql) html+=`<div style="font-size:.68rem;color:#475569;margin-bottom:8px">${results.length} hasil untuk "<strong style="color:#e2e8f0">${q}</strong>"</div>`;

  Object.entries(groups).forEach(([src,rows])=>{
    if(_gsTab==='all') html+=`<div style="font-size:.65rem;font-weight:700;color:${rows[0].srcColor};margin:10px 0 5px;text-transform:uppercase;letter-spacing:.06em">${rows[0].srcLabel}</div>`;
    rows.forEach(r=>{
      html+=`<div class="gs-row" onclick="${r.onclick}">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
          <div class="gs-row-title">${gsHL(r.title,q)}</div>
          <span style="margin-left:auto;font-size:.6rem;background:rgba(0,0,0,.3);color:${r.statusColor};border:1px solid ${r.statusColor};border-radius:4px;padding:1px 6px;white-space:nowrap">${r.status||''}</span>
        </div>
        <div class="gs-row-sub">${gsHL(r.sub,q)}</div>
      </div>`;
    });
    if(_gsTab==='all'&&results.length>rows.length){
      html+=`<div onclick="gsSetTab('${src}')" style="font-size:.68rem;color:#22d3ee;text-align:right;margin-bottom:6px;cursor:pointer">Lihat semua ${rows[0].srcLabel} →</div>`;
    }
  });
  el.innerHTML=html;
}

// ── Migrasi: CUT-3A → CUT-1C di semua data tersimpan ───────────────────
(function migrateCut3A(){
  const OLD='CUT-3A', NEW='CUT-1C';
  let changed=false;

  // History
  const newHistory=history.map(h=>{
    if(h.mesinId===OLD||h.mesin===OLD){changed=true;return{...h,mesinId:h.mesinId===OLD?NEW:h.mesinId,mesin:h.mesin===OLD?NEW:h.mesin};}
    return h;
  });
  if(newHistory.some((_,i)=>newHistory[i]!==history[i])){history=newHistory;save('history',history);}

  // Daily Log
  const dl=JSON.parse(localStorage.getItem('cmmsL_dmlog')||'[]');
  const newDl=dl.map(r=>r.mesin===OLD?{...r,mesin:NEW}:r);
  if(JSON.stringify(dl)!==JSON.stringify(newDl)){localStorage.setItem('cmmsL_dmlog',JSON.stringify(newDl));}

  // PM tasks
  const pm=JSON.parse(localStorage.getItem('cmmsPM')||'[]');
  const newPm=pm.map(p=>p.mesinId===OLD?{...p,mesinId:NEW}:p);
  if(JSON.stringify(pm)!==JSON.stringify(newPm)){localStorage.setItem('cmmsPM',JSON.stringify(newPm));}

  // Machine status overrides
  const ms=JSON.parse(localStorage.getItem('cmmsM_status')||'{}');
  if(ms[OLD]!==undefined){ms[NEW]=ms[OLD];delete ms[OLD];localStorage.setItem('cmmsM_status',JSON.stringify(ms));changed=true;}

  if(changed) console.log('[CMMS] Migrasi CUT-3A → CUT-1C selesai');
})();
(function migrateDailyCaseIds(){
  const badIds=history.filter(h=>h.caseId&&!/^CASE-\d+$/i.test(h.caseId));
  if(!badIds.length) return; // sudah bersih, skip
  // Cari nomor CASE terbesar dari yang sudah benar
  let maxNum=Math.max(0,...history.filter(h=>/^CASE-\d+$/i.test(h.caseId||'')).map(h=>parseInt(h.caseId.replace(/\D/g,''))));
  // Urutkan bad records berdasarkan tanggal agar hasilkan urutan logis
  const sorted=[...badIds].sort((a,b)=>(a.tanggal||'').localeCompare(b.tanggal||'')||(a.caseId||'').localeCompare(b.caseId||''));
  const idMap={};
  sorted.forEach(h=>{ maxNum++; idMap[h.caseId]='CASE-'+String(maxNum).padStart(4,'0'); });
  // Terapkan mapping
  history=history.map(h=>{
    if(idMap[h.caseId]) return{...h,caseId:idMap[h.caseId]};
    return h;
  });
  save('history',history);
  console.log(`[CMMS] Migrasi ${sorted.length} Case ID selesai:`, idMap);
})();

// ═══ FIREBASE (Lazy Load - hanya aktif saat ada internet & klik Login) ═════
let _currentUser = null;
let _fbLoaded = false;
let db = null, auth = null, storage = null;

function showSyncBanner(show) {
  const el = document.getElementById('syncBanner');
  if (el) el.style.display = show ? 'flex' : 'none';
}

async function _loadFirebaseSDK() {
  if (_fbLoaded) return true;
  if (!navigator.onLine) { showToastMsg('❌ Tidak ada internet'); return false; }
  return new Promise(resolve => {
    const scripts = [
      'https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js',
      'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js',
      'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js',
      'https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js'
    ];
    let loaded = 0;
    scripts.forEach(src => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = () => { loaded++; if (loaded === scripts.length) { _initFirebase(); resolve(true); } };
      s.onerror = () => { showToastMsg('❌ Gagal load Firebase'); resolve(false); };
      document.head.appendChild(s);
    });
  });
}

  if (_fbLoaded) return;
  const firebaseConfig = {
    apiKey: "AIzaSyDZWwbY5mfAQmV6_wU37s6oLaNdoOAOR6M",
    authDomain: "cmms1-3122d.firebaseapp.com",
    projectId: "cmms1-3122d",

async function fsGet(key, def) {
  if (!_currentUser || !db) return def;
  try {
    const doc = await db.collection('cmms').doc(_currentUser.uid).collection('data').doc(key).get();
    if (!doc.exists) return def;
    return doc.data().payload;
  } catch(e) { console.warn('fsGet error', e); return def; }
}

async function fsSet(key, value) {
  if (!_currentUser || !db) return;
  try {
    await db.collection('cmms').doc(_currentUser.uid).collection('data').doc(key).set(
      { payload: value, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }
    );
  } catch(e) { console.warn('fsSet error', e); }
}

// ── Upload foto ke Firebase Storage, return URL download ──────────────────
// Input bisa: File object ATAU base64 string
async function uploadFotoToStorage(fileOrB64, path) {
  if (!_currentUser || !storage) return fileOrB64; // fallback: simpan base64
  try {
    let blob;
    if (typeof fileOrB64 === 'string' && fileOrB64.startsWith('data:')) {
      // Convert base64 → blob
      const res = await fetch(fileOrB64);
      blob = await res.blob();
    } else {
      blob = fileOrB64;
    }
    const ref = storage.ref(`cmms/${_currentUser.uid}/${path}_${Date.now()}.jpg`);
    await ref.put(blob, { contentType: 'image/jpeg' });
    return await ref.getDownloadURL();
  } catch(e) {
    console.warn('uploadFotoToStorage error', e);
    return fileOrB64; // fallback ke base64 jika gagal
  }
}

// ── Upload array foto, return array URL (atau base64 jika offline) ─────────
async function uploadFotosArray(b64Array, prefix) {
  if (!_currentUser || !storage) return b64Array;
  showToastMsg('⏳ Upload foto ke cloud...');
  const urls = await Promise.all(
    b64Array.map((f, i) => {
      if (f.startsWith('http')) return Promise.resolve(f); // sudah URL, skip
      return uploadFotoToStorage(f, `${prefix}_${i}`);
    })
  );
  return urls;
}

async function loadAllFromFirestore() {
  if (!_currentUser) return;
  showSyncBanner(true);
  try {
    const [h, pm, sp, mac, dmlog] = await Promise.all([
      fsGet('history', null), fsGet('pm', null), fsGet('sp', null),
      fsGet('machines', null), fsGet('dmlog', null),
    ]);
    if (h !== null) history = decompressArr(h);
    if (pm !== null) preventive = pm;
    if (sp !== null) spareparts = sp.slice().sort((a,b)=>a.kode.localeCompare(b.kode,'id',{numeric:true,sensitivity:'base'}));
    if (mac !== null) machines = mac;
    if (dmlog !== null) localStorage.setItem('cmmsL_dmlog', JSON.stringify(dmlog));
    render(curPage||'dashboard');
    renderDashboard();
    showToastMsg('✅ Data berhasil disinkron!');
  } catch(e) { console.warn('loadAllFromFirestore error', e); }
  showSyncBanner(false);
}

function openLoginModal() {
  const html = `<div style="padding:20px">
    <div style="text-align:center;margin-bottom:16px">
      <div style="font-size:2.5rem">🔐</div>
      <div style="font-size:1rem;font-weight:700;color:#22d3ee;margin-top:4px">CMMS Cloud Sync</div>
      <div style="font-size:.72rem;color:#64748b;margin-top:4px">Login agar data tersinkron di semua perangkat</div>
    </div>
    <div id="authMsg" style="display:none;padding:6px 10px;border-radius:6px;font-size:.75rem;margin-bottom:8px;text-align:center"></div>
    <div class="fg"><label>Email</label><input id="authEmail" type="email" placeholder="email@contoh.com" autocomplete="username"></div>
    <div class="fg"><label>Password</label><input id="authPass" type="password" placeholder="Min. 6 karakter" autocomplete="current-password"></div>
    <button class="btn-save" onclick="doLogin()">🔑 Masuk</button>
    <button class="btn-save" style="background:#065f46;border:1px solid #047857;margin-top:6px" onclick="doRegister()">📝 Daftar Akun Baru</button>
    <button class="btn-save" style="background:#334155;margin-top:6px" onclick="closeModal()">Batal (Pakai Offline)</button>
  </div>`;
  openModal('Login / Daftar', html);
}

async function doLogin() {
  const email = (document.getElementById('authEmail')||{}).value||'';
  const pass  = (document.getElementById('authPass')||{}).value||'';
  if (!email||!pass) { showAuthMsg('⚠️ Email & password wajib diisi','#fcd34d'); return; }
  showAuthMsg('⏳ Memuat Firebase...','#94a3b8');
  const ok = await _loadFirebaseSDK();
  if (!ok) return;
  try {
    showAuthMsg('⏳ Masuk...','#94a3b8');
    await auth.signInWithEmailAndPassword(email.trim(), pass);
    closeModal();
    showToastMsg('✅ Login berhasil! Memuat data...');
  } catch(e) {
    const errs = {'auth/user-not-found':'Akun tidak ditemukan','auth/wrong-password':'Password salah','auth/invalid-email':'Email tidak valid','auth/invalid-credential':'Email atau password salah'};
    showAuthMsg('❌ '+(errs[e.code]||e.message),'#fca5a5');
  }
}

async function doRegister() {
  const email = (document.getElementById('authEmail')||{}).value||'';
  const pass  = (document.getElementById('authPass')||{}).value||'';
  if (!email||!pass) { showAuthMsg('⚠️ Email & password wajib diisi','#fcd34d'); return; }
  if (pass.length < 6) { showAuthMsg('⚠️ Password minimal 6 karakter','#fcd34d'); return; }
  showAuthMsg('⏳ Memuat Firebase...','#94a3b8');
  const ok = await _loadFirebaseSDK();
  if (!ok) return;
  try {
    showAuthMsg('⏳ Mendaftar...','#94a3b8');
    await auth.createUserWithEmailAndPassword(email.trim(), pass);
    closeModal();
    showToastMsg('🎉 Akun berhasil dibuat & login!');
  } catch(e) {
    const errs = {'auth/email-already-in-use':'Email sudah terdaftar, coba login','auth/invalid-email':'Email tidak valid','auth/weak-password':'Password terlalu lemah'};
    showAuthMsg('❌ '+(errs[e.code]||e.message),'#fca5a5');
  }
}

async function doLogout() {
  if (!auth) return;
  if (!confirm('Yakin ingin logout? Data tetap aman di cloud.')) return;
  await auth.signOut();
  _currentUser = null;
  const badge = document.getElementById('userBadge');
  if (badge) badge.textContent = '';
  const btn = document.getElementById('btnLoginLogout');
  if (btn) btn.textContent = '☁️ Login';
  showToastMsg('👋 Logout berhasil');
}

function showAuthMsg(txt, color) {
  const el = document.getElementById('authMsg');
  if (!el) return;
  el.style.display='block'; el.style.color=color;
  el.style.background='rgba(0,0,0,.3)'; el.textContent=txt;
}
