<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CMMS">
<meta name="mobile-web-app-capable" content="yes">
<meta name="description" content="CMMS Maintenance Offline — Kelola mesin, history kerusakan, preventive maintenance, dan stok sparepart.">
<title>CMMS Maintenance</title>
<!-- JSZip untuk export foto -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<!-- XLSX untuk Daily Report export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- PWA Manifest inline -->
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22CMMS+Maintenance%22%2C%22short_name%22%3A%22CMMS%22%2C%22description%22%3A%22Sistem+Manajemen+Perawatan+Mesin+Offline%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230f172a%22%2C%22theme_color%22%3A%22%230f172a%22%2C%22orientation%22%3A%22portrait%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg+xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'+viewBox%3D'0+0+192+192'%253E%253Crect+width%3D'192'+height%3D'192'+rx%3D'32'+fill%3D'%230f172a'%2F%253E%253Ctext+x%3D'96'+y%3D'130'+text-anchor%3D'middle'+font-size%3D'100'+fill%3D'%2322d3ee'%253E%25E2%259A%2599%25EF%25B8%258F%253C%2Ftext%253E%253C%2Fsvg%253E%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#020617;color:#e2e8f0;font-family:Arial,sans-serif;font-size:14px}
:root{--cyan:#22d3ee;--slate:#1e293b;--dark:#0f172a;--border:#334155}
.app{display:flex;flex-direction:column;min-height:100vh}
/* Topbar */
.topbar{background:#0f172a;border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.topbar h1{color:var(--cyan);font-size:1rem;font-weight:900;flex:1}
.topbar .date{color:#475569;font-size:.7rem}
/* Bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#0f172a;border-top:1px solid var(--border);display:flex;z-index:100}
.bnav button{flex:1;padding:10px 4px 8px;background:none;border:none;color:#475569;font-size:.6rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:color .15s}
.bnav button .ico{font-size:1.2rem}
.bnav button.active{color:var(--cyan)}
.bnav button.active .ico{filter:drop-shadow(0 0 4px #22d3ee)}
/* Content */
.page{display:none;padding:14px 14px 80px}
.page.active{display:block}
/* Cards */
.card{background:#1e293b;border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px}
.card-title{font-weight:700;font-size:.9rem;margin-bottom:4px}
.card-sub{color:#64748b;font-size:.75rem}
/* Badges */
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:.65rem;font-weight:700;margin:1px}
.b-green{background:rgba(6,78,59,.5);color:#6ee7b7;border:1px solid #047857}
.b-amber{background:rgba(120,53,15,.5);color:#fcd34d;border:1px solid #b45309}
.b-red{background:rgba(127,29,29,.5);color:#fca5a5;border:1px solid #b91c1c}
.b-blue{background:rgba(30,58,138,.5);color:#93c5fd;border:1px solid #1d4ed8}
.b-slate{background:rgba(51,65,85,.5);color:#cbd5e1;border:1px solid #475569}
.b-cyan{background:rgba(8,145,178,.2);color:#22d3ee;border:1px solid #0891b2}
/* Stats grid */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat{border-radius:10px;padding:11px;border:1px solid}
.stat .val{font-size:1.3rem;font-weight:900}
.stat .lbl{font-size:.65rem;color:#94a3b8;margin-top:1px}
/* Buttons */
.btn{padding:8px 14px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:.8rem;font-family:Arial,sans-serif}
.btn-cyan{background:#0891b2;color:#fff}
.btn-green{background:#065f46;color:#6ee7b7;border:1px solid #047857}
.btn-red{background:rgba(127,29,29,.5);color:#fca5a5;border:1px solid #991b1b}
.btn-sm{padding:4px 9px;font-size:.7rem;border-radius:6px;border:none;cursor:pointer;font-weight:700;font-family:Arial,sans-serif}
.btn-edit{background:#334155;color:#fff}
.btn-del{background:rgba(127,29,29,.4);color:#fca5a5;border:none}
.hrow{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap;margin-bottom:12px}
/* Form/Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;align-items:center;justify-content:center;padding:12px}
.modal-bg.open{display:flex}
.modal{background:#0f172a;border:1px solid var(--border);border-radius:14px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#0f172a;z-index:1}
.modal-head h3{font-size:.9rem;font-weight:700}
.modal-close{background:none;border:none;color:#64748b;font-size:1.4rem;cursor:pointer;line-height:1}
.modal-body{padding:14px}
.fg{margin-bottom:10px}
.fg label{display:block;font-size:.68rem;color:#94a3b8;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
.fg input,.fg select,.fg textarea{width:100%;background:#1e293b;border:1px solid var(--border);color:#e2e8f0;border-radius:7px;padding:7px 10px;font-size:.82rem;outline:none;font-family:Arial,sans-serif}
.fg input:focus,.fg select:focus{border-color:var(--cyan)}
.fg select option{background:#1e293b}
.btn-save{width:100%;background:#0891b2;color:#fff;border:none;padding:10px;border-radius:8px;font-size:.88rem;font-weight:700;cursor:pointer;margin-top:6px}
/* Search */
.search{width:100%;background:#1e293b;border:1px solid var(--border);color:#e2e8f0;border-radius:8px;padding:8px 12px;font-size:.82rem;outline:none;margin-bottom:10px;font-family:Arial,sans-serif}
/* Table */
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border);margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:.75rem}
thead{background:#1e293b}
th{padding:8px 10px;color:#64748b;font-size:.65rem;text-transform:uppercase;text-align:left;white-space:nowrap}
td{padding:8px 10px;border-top:1px solid rgba(51,65,85,.4);vertical-align:middle}
tr:nth-child(even){background:rgba(15,23,42,.4)}
/* Info/warn box */
.info-box{background:rgba(34,211,238,.07);border:1px solid rgba(34,211,238,.2);border-radius:7px;padding:7px 10px;font-size:.72rem;color:#94a3b8;margin-bottom:8px}
.warn-box{background:rgba(245,158,11,.07);border:1px solid rgba(180,83,9,.3);border-radius:7px;padding:7px 10px;font-size:.72rem;color:#fcd34d;margin-bottom:8px}
/* Rank */
.rank-item{display:flex;align-items:center;gap:8px;background:rgba(2,6,23,.5);border-radius:7px;padding:8px 10px;margin-bottom:5px}
.rnum{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.8rem;flex-shrink:0}
.r1{background:#f59e0b;color:#000}.r2{background:#94a3b8;color:#000}.r3{background:#92400e;color:#fff}.rn{background:#1e293b;color:#94a3b8}
/* Section label */
.sec{font-size:.68rem;text-transform:uppercase;letter-spacing:.07em;margin:10px 0 6px;color:#64748b}
.sec.cyan{color:#22d3ee}.sec.red{color:#f87171}.sec.amber{color:#fbbf24}
/* Toast */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#065f46;color:#6ee7b7;border:1px solid #047857;border-radius:8px;padding:6px 16px;font-size:.78rem;font-weight:700;z-index:300;display:none;white-space:nowrap}
.toast.show{display:block}
/* Filter chips */
.chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.chip{padding:4px 10px;border-radius:6px;border:none;font-size:.7rem;font-weight:700;cursor:pointer;background:#1e293b;color:#94a3b8;font-family:Arial,sans-serif}
.chip.on{background:#0891b2;color:#fff}
/* Type toggle */
.ttype{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:4px}
.ttype button{padding:8px;border-radius:7px;border:2px solid var(--border);background:#1e293b;color:#94a3b8;font-size:.78rem;font-weight:700;cursor:pointer;font-family:Arial,sans-serif;transition:all .15s}
.ttype button.on{border-color:#0891b2;background:rgba(8,145,178,.2);color:#22d3ee}
/* HCard fields */
.hcf-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.hcf{background:rgba(2,6,23,.5);border-radius:6px;padding:6px 8px}
.hcf .lbl{font-size:.62rem;color:#64748b;text-transform:uppercase}
.hcf .val{font-size:.78rem;font-weight:600;color:#e2e8f0}
/* Bar chart */
.bar-row{margin-bottom:7px}
.bar-row .bar-label{display:flex;justify-content:space-between;margin-bottom:2px;font-size:.73rem}
.bar-bg{background:#1e293b;border-radius:3px;height:6px}
.bar-fill{border-radius:3px;height:6px;transition:width .3s}
/* Stok ctrl */
.stk{display:flex;align-items:center;gap:4px;justify-content:center}
.stk button{width:22px;height:22px;background:#334155;border:none;color:#fff;border-radius:4px;cursor:pointer;font-size:.9rem}
/* Multi-select detail kerusakan */
.dk-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.dk-chip{padding:4px 9px;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;font-size:.7rem;cursor:pointer;font-family:Arial,sans-serif;transition:all .15s}
.dk-chip.sel{background:rgba(185,28,28,.25);border-color:#b91c1c;color:#fca5a5}
/* Part datang toggle */
.part-datang-btn{width:100%;padding:8px;border-radius:7px;border:1px solid #047857;background:rgba(6,78,59,.3);color:#6ee7b7;font-size:.8rem;font-weight:700;cursor:pointer;font-family:Arial,sans-serif;margin-bottom:8px}
/* Splash screen */
#splash{position:fixed;inset:0;background:#020617;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;transition:opacity .4s}
#splash.hide{opacity:0;pointer-events:none}
#splash .sp-logo{font-size:4rem;animation:pulse 1.2s infinite}
#splash .sp-title{font-size:1.4rem;font-weight:900;color:#22d3ee;letter-spacing:.05em}
#splash .sp-sub{font-size:.75rem;color:#475569}
#splash .sp-bar{width:160px;height:3px;background:#1e293b;border-radius:3px;overflow:hidden;margin-top:8px}
#splash .sp-progress{height:100%;background:linear-gradient(90deg,#0891b2,#22d3ee);border-radius:3px;animation:load 1s ease forwards}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes load{from{width:0}to{width:100%}}
/* Install banner */
#install-banner{display:none;position:fixed;bottom:68px;left:8px;right:8px;background:#0f172a;border:1px solid #0891b2;border-radius:12px;padding:10px 14px;z-index:150;flex-direction:row;align-items:center;gap:10px;box-shadow:0 4px 24px rgba(0,0,0,.5)}
#install-banner.show{display:flex}
#install-banner .ib-text{flex:1;font-size:.75rem;color:#94a3b8}
#install-banner .ib-text strong{color:#22d3ee;display:block;font-size:.82rem;margin-bottom:2px}
/* Custom confirm dialog */
#cmms-confirm{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;align-items:center;justify-content:center;padding:16px}
#cmms-confirm.open{display:flex}
#cmms-confirm .cc-box{background:#0f172a;border:1px solid #334155;border-radius:14px;padding:20px;width:100%;max-width:320px}
#cmms-confirm .cc-title{font-weight:700;margin-bottom:8px;font-size:.95rem}
#cmms-confirm .cc-msg{font-size:.8rem;color:#94a3b8;margin-bottom:16px;line-height:1.5}
#cmms-confirm .cc-btns{display:flex;gap:8px}
#cmms-confirm .cc-btns button{flex:1;padding:9px;border-radius:8px;border:none;font-weight:700;font-size:.82rem;cursor:pointer;font-family:Arial,sans-serif}
.cc-ok{background:#b91c1c;color:#fff}
.cc-cancel{background:#334155;color:#e2e8f0}
/* Swipe hint on first open */
.swipe-hint{text-align:center;color:#334155;font-size:.65rem;padding:4px;letter-spacing:.05em}
/* Daily Report styles */
.d-field{display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
.d-field label{font-size:.65rem;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em}
.d-field input,.d-field select,.d-field textarea{border:1.5px solid var(--border);border-radius:7px;padding:7px 10px;font-size:.82rem;font-family:Arial,sans-serif;color:#e2e8f0;background:#1e293b;outline:none;transition:border-color .2s,box-shadow .2s;width:100%}
.d-field input:focus,.d-field select:focus,.d-field textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(34,211,238,.1);background:#0f172a}
.d-field select option{background:#1e293b}
.d-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.d-tabs{display:flex;background:rgba(2,6,23,.5);border-radius:8px;padding:3px;margin-bottom:10px;gap:3px}
.d-tab{flex:1;padding:7px 4px;border:none;border-radius:6px;background:transparent;color:#64748b;font-size:.72rem;font-weight:700;cursor:pointer;font-family:Arial,sans-serif;transition:all .15s;text-align:center}
.d-tab.on{background:#0891b2;color:#fff}
.d-job-card{background:rgba(2,6,23,.5);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:8px;position:relative}
.d-job-card.carry{border-color:#7c3aed;background:rgba(124,58,237,.05)}
.d-job-num{font-size:.6rem;color:#475569;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.d-row2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.d-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.d-status-group{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:2px}
.d-status-btn{padding:7px 2px;border-radius:7px;border:2px solid transparent;font-size:.68rem;font-weight:700;cursor:pointer;transition:all .12s;text-align:center;background:#1e293b;color:#64748b;font-family:Arial,sans-serif}
.d-status-btn.ok{background:rgba(6,78,59,.4);color:#6ee7b7;border-color:#047857}
.d-status-btn.lanjut{background:rgba(120,53,15,.4);color:#fcd34d;border-color:#b45309}
.d-status-btn.pending{background:rgba(127,29,29,.4);color:#fca5a5;border-color:#991b1b}
.d-status-btn.cancel{background:rgba(51,65,85,.4);color:#94a3b8;border-color:#334155}
.d-add-btn{width:100%;padding:11px;border:2px dashed #334155;border-radius:10px;background:transparent;color:#475569;font-size:.8rem;font-weight:700;cursor:pointer;transition:all .18s;font-family:Arial,sans-serif;margin-bottom:8px}
.d-add-btn:hover{border-color:#0891b2;color:#22d3ee}
.d-del-btn{position:absolute;top:8px;right:8px;width:22px;height:22px;border:none;border-radius:5px;background:rgba(127,29,29,.3);color:#fca5a5;cursor:pointer;font-size:.75rem;line-height:22px;text-align:center}
.d-durasi{font-size:.8rem;font-weight:700;color:#22d3ee;background:rgba(8,145,178,.15);border-radius:5px;padding:7px 6px;text-align:center;min-width:42px}
.d-sum-strip{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.d-sum-chip{padding:4px 10px;border-radius:5px;font-size:.7rem;font-weight:700;display:flex;align-items:center;gap:4px}
.d-log-row{background:rgba(2,6,23,.4);border:1px solid rgba(51,65,85,.3);border-radius:7px;padding:7px 10px;margin-bottom:5px;font-size:.75rem}
.d-log-row:hover{background:rgba(30,41,59,.6)}
.d-log-meta{font-size:.65rem;color:#64748b;margin-bottom:3px;display:flex;gap:8px;flex-wrap:wrap}
.d-log-job{font-weight:600;color:#e2e8f0;margin-bottom:2px}
.d-log-detail{font-size:.68rem;color:#94a3b8}
.d-sync-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:.62rem;font-weight:700;background:rgba(124,58,237,.25);color:#c4b5fd;border:1px solid #7c3aed}
.d-period-btn{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:#1e293b;color:#94a3b8;font-size:.7rem;font-weight:700;cursor:pointer;font-family:Arial,sans-serif;transition:all .15s}
.d-period-btn.on{background:#0891b2;color:#fff;border-color:#0891b2}
.d-carry-banner{background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.35);border-radius:8px;padding:8px 12px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:.75rem}
/* Foto Grid */
.foto-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;margin-bottom:6px}
.foto-thumb{position:relative;width:80px;height:80px;border-radius:8px;overflow:hidden;border:1px solid #334155;flex-shrink:0}
.foto-thumb img{width:100%;height:100%;object-fit:cover;cursor:pointer;display:block}
.del-foto{position:absolute;top:2px;right:2px;width:20px;height:20px;background:rgba(127,29,29,.85);border:none;color:#fca5a5;border-radius:4px;cursor:pointer;font-size:.8rem;line-height:20px;text-align:center;padding:0}
.foto-add{width:80px;height:80px;border:2px dashed #334155;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:#475569;font-size:.6rem;font-weight:700;transition:border-color .18s;flex-shrink:0}
.foto-add:hover{border-color:#0891b2;color:#22d3ee}
/* Foto Viewer fullscreen */
#foto-viewer{display:none!important;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:400;flex-direction:column;align-items:center;justify-content:center;padding:16px}
#foto-viewer.open{display:flex!important}
#foto-viewer #fv-img{max-width:100%;max-height:80vh;object-fit:contain;border-radius:10px}
.fv-caption{color:#94a3b8;font-size:.75rem;margin-top:8px;text-align:center}
.fv-close{position:absolute;top:12px;right:12px;background:rgba(30,41,59,.85);border:1px solid #334155;color:#e2e8f0;border-radius:8px;width:36px;height:36px;font-size:1.2rem;cursor:pointer;line-height:36px;text-align:center;padding:0}
/* Global Search */
.gs-tab{background:#1e293b;border:1px solid #334155;color:#94a3b8;border-radius:6px;padding:4px 10px;font-size:.7rem;cursor:pointer;transition:all .15s}
.gs-tab.active{background:rgba(34,211,238,.15);border-color:#22d3ee;color:#22d3ee;font-weight:700}
.gs-row{background:#1e293b;border:1px solid #334155;border-radius:9px;padding:10px 12px;margin-bottom:7px;cursor:pointer;transition:border-color .15s}
.gs-row:active{border-color:#22d3ee}
.gs-row-source{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.gs-row-title{font-size:.82rem;font-weight:700;color:#e2e8f0;margin-bottom:2px}
.gs-row-sub{font-size:.68rem;color:#64748b;line-height:1.4}
.gs-hl{background:rgba(34,211,238,.25);color:#22d3ee;border-radius:2px;padding:0 2px}
/* Dokumen */
.dok-tag-btn{background:#1e293b;border:1px solid #334155;color:#94a3b8;border-radius:6px;padding:4px 10px;font-size:.68rem;cursor:pointer;transition:all .15s}
.dok-tag-btn.active{background:rgba(124,58,237,.2);border-color:rgba(124,58,237,.5);color:#c4b5fd;font-weight:700}
.dok-tab-btn{background:#1e293b;border:1px solid #334155;color:#94a3b8;border-radius:7px;padding:7px 10px;font-size:.72rem;cursor:pointer;flex:1;text-align:center;transition:all .15s}
.dok-tab-btn.active{background:rgba(8,145,178,.15);border-color:#22d3ee;color:#e2e8f0;font-weight:700}

/* ═══ DESKTOP RESPONSIVE (≥768px) ════════════════════════════════════════ */
@media (min-width: 768px) {
  body { font-size: 15px; }
  .app { flex-direction: row; min-height: 100vh; }

  /* Sidebar kiri menggantikan bottom nav */
  .bnav {
    position: fixed; top: 0; left: 0; bottom: 0; right: auto;
    width: 180px; flex-direction: column;

// Kompresi sederhana: menghapus key yg bernilai null/kosong & menggunakan key pendek saat save
const KEY_MAP={caseId:"ci",tanggal:"tg",mesinId:"mi",merk:"mk",area:"ar",tipeKerja:"tk",jenisKerusakan:"jk",areaKerusakan:"ak",detailKerusakan:"dk",keterangan:"kt",teknisi:"te",shift:"sh",timeStart:"ts",timeFinish:"tf",tanggalSelesai:"ts2",downtime:"dt",pmId:"pm",partNama:"pn",partSupplier:"ps",partTglOrder:"pto",partEta:"pe",partQty:"pq",fotos:"ft",status:"st"};
const KEY_RMAP=Object.fromEntries(Object.entries(KEY_MAP).map(([k,v])=>[v,k]));
function compressRec(rec){const r={};for(const k in rec){const v=rec[k];if(v===null||v===undefined||v===""||( Array.isArray(v)&&v.length===0))continue;const sk=KEY_MAP[k]||k;r[sk]=v;}return r;}
function decompressRec(rec){const r={};for(const k in rec){const v=rec[k];const lk=KEY_RMAP[k]||k;r[lk]=v;}return r;}
function compressArr(arr){return Array.isArray(arr)?arr.map(compressRec):arr;}
function decompressArr(arr){return Array.isArray(arr)?arr.map(decompressRec):arr;}
function ls(k,d){
  try{
    const v=localStorage.getItem("cmmsL_"+k);
    if(!v)return d;
    const parsed=JSON.parse(v);
    // History & PM pakai kompresi, lainnya tidak
    if(k==="history")return decompressArr(parsed);
    return parsed;
  }catch{return d;}
}
function ss(k,v){
  try{
    const toStore=k==="history"?compressArr(v):v;
    localStorage.setItem("cmmsL_"+k,JSON.stringify(toStore));
  }catch(e){
    console.warn("localStorage full:",e);
    if(k==="sp"){
      // Foto sketch terlalu besar — simpan SP tanpa foto, foto di key terpisah
      try{
        const slim=v.map(s=>({...s,sketches:[]}));
        localStorage.setItem("cmmsL_sp",JSON.stringify(slim));
      }catch(e2){
        showToastMsg("❌ Storage penuh! Hapus data lama.");
      }
    } else {
      showToastMsg("❌ Gagal simpan: storage penuh");
    }
  }
}

let machines=ls("machines",MACHINES_DEFAULT);
let history=ls("history",[]);
let preventive=ls("pm",[]);
let spareparts=(ls("sp",SP_DEFAULT)).slice().sort((a,b)=>a.kode.localeCompare(b.kode,'id',{numeric:true,sensitivity:'base'}));
let curPage="dashboard";
let editId=null;

function save(k,v){
  ss(k,v);
  // Sync ke Firestore juga
  if(_currentUser){
    const toStore = k==="history" ? compressArr(v) : v;
    fsSet(k, toStore).catch(e=>console.warn('Firestore save error',e));
  }
  if(k==="history")_auditCache.html=null;
  showToast();
}
function showToast(){const t=document.getElementById("toast");t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1800);}
function today(){return new Date().toISOString().split("T")[0];}
function fmtMin(m){
  if(!m||m===0)return"-";
  const hr=Math.floor(m/60),mn=m%60;
  const dy=Math.floor(hr/24),rh=hr%24;
  if(dy>0) return dy+"h "+rh+"j "+mn+"m";
  return hr>0?hr+"j "+mn+"m":mn+"m";
}
function calcDT(s,e,d,dEnd){if(!s||!e||!d)return 0;try{const a=new Date(d+"T"+s),b=new Date((dEnd&&dEnd>=d?dEnd:d)+"T"+e),df=(b-a)/60000;return df>0?Math.round(df):0;}catch{return 0;}}
function badge(s){const m={"OK":"b-green","Aktif":"b-green","Selesai":"b-green","REPAIR":"b-amber","Terlambat":"b-red","Proses":"b-blue","Mendatang":"b-slate","Jatuh Tempo":"b-amber","STOP":"b-red","Planned":"b-slate","Terjadwal":"b-blue","Progress":"b-blue","PREVENTIVE":"b-cyan","CORRECTIVE":"b-amber"};return"badge "+(m[s]||"b-slate");}
function mkBadge(s){return`<span class="${badge(s)}">${s}</span>`;}
function opts(arr,sel){return arr.map(a=>`<option value="${a}"${a===sel?" selected":""}>${a}</option>`).join("");}
function mOpts(sel){return machines.map(m=>`<option value="${m.id}"${m.id===sel?" selected":""}>${m.id} — ${m.type} ${m.merk} (${m.area})</option>`).join("");}

function nav(pg){
  closeFotoViewer(); // tutup foto viewer saat pindah halaman
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".bnav button").forEach(b=>b.classList.remove("active"));
  document.getElementById("pg-"+pg).classList.add("active");
  const settingBtn=document.getElementById("btn-setting-top");
  if(settingBtn)settingBtn.style.color=pg==="setting"?"#22d3ee":"#475569";
  const bnavPages=["dashboard","mesin","history","daily","preventive","sparepart","audit"];
  const idx=bnavPages.indexOf(pg);
  if(idx>=0)document.querySelectorAll(".bnav button")[idx].classList.add("active");
  curPage=pg;
  render(pg);
}
function render(pg){
  if(pg==="dashboard")renderDashboard();
  else if(pg==="mesin")renderMesin();
  else if(pg==="history")renderHistory();
  else if(pg==="daily")renderDaily();
  else if(pg==="preventive")renderPreventive();
  else if(pg==="sparepart")renderSparepart();
  else if(pg==="audit")renderAudit();
  else if(pg==="setting")renderSetting();
}

// ═══ DASHBOARD ════════════════════════════════════════════════════════════
function getShift(timeStr){
  if(!timeStr)return"Tidak Diketahui";
  const [h]=timeStr.split(":").map(Number);
  if(h>=8&&h<16)return"Pagi";
  if(h>=16&&h<24)return"Malam";
  return"Tidak Diketahui";
}
function mttr(mesinId){
  const selesai=history.filter(h=>h.mesinId===mesinId&&h.status==="Selesai"&&h.downtime>0);
  if(!selesai.length)return 0;
  return Math.round(selesai.reduce((a,h)=>a+(h.downtime||0),0)/selesai.length);
}
function mtbf(mesinId){
  const selesai=history.filter(h=>h.mesinId===mesinId&&h.status==="Selesai"&&h.tanggal).sort((a,b)=>a.tanggal.localeCompare(b.tanggal));
  if(selesai.length<2)return 0;
  let gaps=0,count=0;
  for(let i=1;i<selesai.length;i++){
    const gap=Math.round((new Date(selesai[i].tanggal)-new Date(selesai[i-1].tanggal))/(1000*60*60*24));
    if(gap>0){gaps+=gap;count++;}
  }
  return count?Math.round(gaps/count):0;
}
function barSvg(data,maxVal,color){
  if(!data.length)return"";
  const W=42,H=36,gap=3,bw=Math.max(4,Math.floor((W-(data.length-1)*gap)/data.length));
  const bars=data.map((v,i)=>{
    const bh=maxVal?Math.round((v/maxVal)*H):0;
    const x=i*(bw+gap),y=H-bh;
    return`<rect x="${x}" y="${y}" width="${bw}" height="${bh}" rx="1" fill="${color}" opacity="${bh?0.85:0.15}"/>`;
  }).join("");
  return`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block">${bars}</svg>`;
}

function renderDashboard(){

    const m=machines.find(x=>x.id===h.mesinId);

        </div>
        ${mkBadge(h.status||"Proses")}
      </div>
    </div>`;
  }).join("")}`:""}
  `;

  document.getElementById("pg-dashboard").innerHTML=`<div style="padding-bottom:80px">${html}</div>`;

let mesinQ="",mesinArea="Semua",mesinType="Semua";
function renderMesin(){
  const areas=["Semua",...new Set(machines.map(m=>m.area))];
  const types=["Semua",...new Set(machines.map(m=>m.type))];

  });
  const sc=s=>s==="OK"?"#34d399":s==="REPAIR"?"#fbbf24":"#f87171";
  let html=`
  <div class="hrow">
    <div><div style="font-size:1.2rem;font-weight:900">Data <span style="color:#22d3ee">Mesin</span></div><div style="font-size:.75rem;color:#64748b">${machines.length} unit</div></div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">

    <select onchange="mesinType=this.value;renderMesin()" style="background:#1e293b;border:1px solid #334155;color:#e2e8f0;border-radius:7px;padding:6px 9px;font-size:.78rem;outline:none">${types.map(t=>`<option${t===mesinType?" selected":""}>${t}</option>`).join("")}</select>

    </tr>`;
  });
  html+=`</tbody></table></div>`;
  document.getElementById("pg-mesin").innerHTML=html;

// ── Detail Mesin (Fitur 6) ────────────────────────────────────────────────
function openMesinDetail(id){
  const m=machines.find(x=>x.id===id);
  if(!m)return;
  const mh=[...history.filter(h=>h.mesinId===id)].sort((a,b)=>{
    const na=parseInt((a.caseId||'').replace(/\D/g,'')||0),nb=parseInt((b.caseId||'').replace(/\D/g,'')||0);
    return nb-na;
  });
  const dl=JSON.parse(localStorage.getItem('cmmsL_dmlog')||'[]').filter(r=>r.mesin===id);
  const totalDur=mh.reduce((a,h)=>a+(h.downtime||0),0)+dl.reduce((a,r)=>a+parseMnt(r.durasi),0);
  const selesai=mh.filter(h=>h.status==='Selesai').length;
  const sc=s=>s==='OK'?'#34d399':s==='REPAIR'?'#fbbf24':'#f87171';

function openEditMesin(id){
  const m=machines.find(x=>x.id===id);if(!m)return;editId=id;
  openModal("Edit Mesin",`
    <div class="fg"><label>Kode Mesin</label><input id="f-id" value="${m.id}" readonly style="color:#64748b"/></div>
    <div class="fg"><label>Jenis Mesin</label><select id="f-type">${opts(["BUBUT","MILLING","VERTICAL BORING","RADIAL DRILLING","CRANE","LAS MIG","LAS TIG","CUTTING TORCH"],m.type)}</select></div>

    <div class="fg"><label>Merk</label><input id="f-merk" value="${m.merk}"/></div>
    <div class="fg"><label>Kapasitas</label><input id="f-kap" value="${m.kap}"/></div>
    <div class="fg"><label>Status</label><select id="f-status">${opts(["OK","REPAIR","STOP"],m.status)}</select></div>
    <div class="fg"><label>📝 Catatan Mesin</label><textarea id="f-notes" rows="3" placeholder="cth: Sering bermasalah di spindle, spare part sulit dicari..." style="width:100%;background:#0f172a;border:1px solid #334155;color:#e2e8f0;border-radius:8px;padding:8px;font-size:.8rem;resize:vertical;outline:none">${(m.notes||'').replace(/</g,'&lt;')}</textarea></div>
    <button class="btn-save" onclick="saveMesin()">💾 Simpan</button>`);
}
function saveMesin(){
  const id=document.getElementById("f-id").value.trim();
  if(!id){alert("Kode wajib diisi!");return;}
  const rec={id,type:document.getElementById("f-type").value,area:document.getElementById("f-area").value,merk:document.getElementById("f-merk").value,kap:document.getElementById("f-kap").value,status:document.getElementById("f-status").value,notes:(document.getElementById("f-notes")||{}).value||''};
  if(editId)machines=machines.map(m=>m.id===editId?rec:m);
  else machines=[...machines,rec];
  save("machines",machines);closeModal();renderMesin();
}
function delMesin(id){if(confirm("Hapus mesin "+id+"?")){machines=machines.filter(m=>m.id!==id);save("machines",machines);renderMesin();}}
function exportMesin(){
  const rows=[["KODE","JENIS","AREA","MERK","KAPASITAS","STATUS","JML KERUSAKAN"],...machines.map(m=>[m.id,m.type,m.area,m.merk,m.kap,m.status,history.filter(h=>h.mesinId===m.id).length])];
  dlCSV(rows,"Data_Mesin");
}

function nextCaseId(){
  // Hanya hitung CASE-XXXX yang valid, abaikan D... dari Daily
  const nums=history.map(h=>{
    const m=(h.caseId||'').match(/^CASE-(\d+)$/i);
    return m?parseInt(m[1]):0;
  });
  return 'CASE-'+String(Math.max(0,...nums)+1).padStart(4,'0');
}

// ── Cleanup: hapus history card duplikat fromDaily mesin+tipe yang masih open ──
function cleanupDupHistory(){
  const seen={};
  const toRemove=[];
  // Urutkan dari terlama ke terbaru agar yang pertama yang dipertahankan
  const sorted=[...history].sort((a,b)=>(a.tanggal||'').localeCompare(b.tanggal||''));
  sorted.forEach(h=>{
    if(!h.fromDaily) return;
    if(h.status==='Selesai') return; // yang sudah selesai biarkan
    const key=h.mesinId+'|'+h.tipeKerja;
    if(seen[key]){
      // Sudah ada card open untuk mesin+tipe ini → ini duplikat
      toRemove.push(h.caseId);
    } else {
      seen[key]=h.caseId;
    }
  });
  if(!toRemove.length){
    showToastMsg('✅ Tidak ada duplikat ditemukan');
    return;
  }
  if(!confirm(`Ditemukan ${toRemove.length} History Card duplikat (fromDaily).\nHapus duplikat dan pertahankan yang terlama?\n\nCaseId duplikat:\n${toRemove.join(', ')}`)) return;
  history=history.filter(h=>!toRemove.includes(h.caseId));
  // Update linkedCaseId di dmLog agar tidak menunjuk ke card yang sudah dihapus
  dmLog=dmLog.map(r=>{
    if(r.linkedCaseId&&toRemove.includes(r.linkedCaseId)){
      // Cari card pengganti
      const mId=r.mesin; const tp=({'Corrective':'CORRECTIVE','Preventive':'PREVENTIVE','Fabrication':'CORRECTIVE','Support':'CORRECTIVE','Cleaning':'PREVENTIVE'})[r.kat]||'CORRECTIVE';
      const repl=(history.find(h=>h.fromDaily&&h.mesinId===mId&&h.tipeKerja===tp&&(h.status==='Proses'||h.status==='Pending'))||{}).caseId||'';
      return{...r,linkedCaseId:repl};
    }
    return r;
  });
  save('history',history);
  saveDmLog();
  renderDashboard();
  showToastMsg(`🗑️ ${toRemove.length} duplikat dihapus`);
}

function toggleDKChip(btn,val){
  btn.classList.toggle("sel");
  const hidden=document.getElementById("h-detailKerusakan");
  const current=hidden.value?hidden.value.split("||").filter(Boolean):[];
  if(btn.classList.contains("sel")){if(!current.includes(val))current.push(val);}
  else{const i=current.indexOf(val);if(i>-1)current.splice(i,1);}
  hidden.value=current.join("||");
}

// ─── FOTO FUNCTIONS ────────────────────────────────────────────────────────
let _formFotos=[];
function handleFotoInput(event){
  const files=Array.from(event.target.files);
  const remaining=5-_formFotos.length;
  const toProcess=files.slice(0,remaining);
  let loaded=0;
  toProcess.forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      // Compress: resize to max 800px
      const img=new Image();
      img.onload=()=>{
        const MAX=800;
        let w=img.width,h=img.height;
        if(w>MAX||h>MAX){const r=Math.min(MAX/w,MAX/h);w=Math.round(w*r);h=Math.round(h*r);}
        const canvas=document.createElement("canvas");
        canvas.width=w;canvas.height=h;
        canvas.getContext("2d").drawImage(img,0,0,w,h);
        const b64=canvas.toDataURL("image/jpeg",0.7);
        _formFotos.push(b64);
        loaded++;
        if(loaded===toProcess.length)refreshFotoGrid();
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
  event.target.value="";
}
function refreshFotoGrid(){
  const grid=document.getElementById("foto-preview-grid");
  const addBtn=document.getElementById("foto-add-btn");
  if(!grid)return;
  // Remove existing thumbs, keep add btn
  grid.querySelectorAll(".foto-thumb").forEach(el=>el.remove());
  // Re-insert thumbs before add btn
  _formFotos.forEach((f,i)=>{
    const div=document.createElement("div");
    div.className="foto-thumb";

function etaLabel(eta){
  if(!eta)return"";
  const diff=Math.round((new Date(eta)-new Date(today()))/(1000*60*60*24));
  if(diff<0)return`<span style="color:#f87171">⚠️ Sudah lewat ${Math.abs(diff)} hari dari estimasi!</span>`;
  if(diff===0)return`<span style="color:#fbbf24">🟡 Estimasi tiba HARI INI</span>`;
  return`<span style="color:#6ee7b7">🕐 Estimasi tiba ${diff} hari lagi (${eta})</span>`;
}

function calcDTForm(){
  const s=document.getElementById("h-timeStart").value;
  const e=document.getElementById("h-timeFinish").value;
  const d=document.getElementById("h-tanggal").value;
  const dEnd=document.getElementById("h-tanggalSelesai")?document.getElementById("h-tanggalSelesai").value:"";
  // Auto-validate: tanggalSelesai tidak boleh sebelum tanggal mulai
  if(dEnd&&dEnd<d){document.getElementById("h-tanggalSelesai").style.borderColor="#f87171";document.getElementById("dt-display").innerHTML="⚠️ Tanggal selesai tidak boleh sebelum tanggal mulai!";document.getElementById("dt-display").style.display="";return;}
  if(document.getElementById("h-tanggalSelesai"))document.getElementById("h-tanggalSelesai").style.borderColor=dEnd&&dEnd!==d?"#22d3ee":"";
  const dt=calcDT(s,e,d,dEnd||d);
  document.getElementById("h-downtime").value=dt;
  const disp=document.getElementById("dt-display");
  if(dt>0){
    const days=dEnd&&dEnd!==d?` (${Math.floor(dt/60/24)} hari ${Math.floor((dt%1440)/60)}j ${dt%60}m)`:"";
    disp.innerHTML=`⏱ Downtime: <strong>${fmtMin(dt)}</strong>${days}`;disp.style.display="";}
  else disp.style.display="none";
}

function saveHistory(){
  const mesinId=document.getElementById("h-mesinId").value;
  const tanggal=document.getElementById("h-tanggal").value;
  if(!mesinId||!tanggal){alert("Mesin & Tanggal wajib!");return;}
  // Validasi waktu: mulai diisi tapi selesai kosong
  const tStart=document.getElementById("h-timeStart").value;
  const tFinish=document.getElementById("h-timeFinish").value;
  if(tStart&&!tFinish){
    const lanjut=confirm("⚠️ Waktu Selesai belum diisi.\nDowntime tidak akan terhitung.\n\nLanjut simpan tanpa waktu selesai?");
    if(!lanjut)return;
  }
  const status=document.getElementById("h-status").value;
  const rec={
    caseId:editId||nextCaseId(),tanggal,mesinId,
    merk:(machines.find(x=>x.id===mesinId)||{}).merk||"",
    area:(machines.find(x=>x.id===mesinId)||{}).area||"",
    tipeKerja:document.getElementById("h-tipeKerja").value,
    jenisKerusakan:document.getElementById("h-jenisKerusakan").value,
    areaKerusakan:document.getElementById("h-areaKerusakan").value,
    detailKerusakan:(()=>{const v=document.getElementById("h-detailKerusakan")?document.getElementById("h-detailKerusakan").value:"";return v?v.split("||").filter(Boolean):[];})(),
    keterangan:document.getElementById("h-keterangan").value,
    teknisi:document.getElementById("h-teknisi").value,
    shift:document.getElementById("h-shift")?document.getElementById("h-shift").value:"",
    timeStart:document.getElementById("h-timeStart").value,
    timeFinish:document.getElementById("h-timeFinish").value,
    tanggalSelesai:document.getElementById("h-tanggalSelesai")?document.getElementById("h-tanggalSelesai").value:"",
    downtime:parseInt(document.getElementById("h-downtime").value)||0,
    pmId:document.getElementById("h-pmId")?document.getElementById("h-pmId").value:"",
    partNama:document.getElementById("h-partNama")?document.getElementById("h-partNama").value:"",
    partSupplier:document.getElementById("h-partSupplier")?document.getElementById("h-partSupplier").value:"",
    partTglOrder:document.getElementById("h-partTglOrder")?document.getElementById("h-partTglOrder").value:"",
    partEta:document.getElementById("h-partEta")?document.getElementById("h-partEta").value:"",
    partQty:document.getElementById("h-partQty")?document.getElementById("h-partQty").value:"",
    partStatus:document.getElementById("h-partStatus")?document.getElementById("h-partStatus").value:"—",
    fotos:_formFotos||[],
    status
  };
  if(status==="Proses"||status==="Pending")machines=machines.map(m=>m.id===mesinId?{...m,status:"REPAIR"}:m);
  else if(status==="Selesai"){
    const others=history.filter(h=>h.mesinId===mesinId&&h.caseId!==rec.caseId&&(h.status==="Proses"||h.status==="Pending"));
    if(!others.length)machines=machines.map(m=>m.id===mesinId?{...m,status:"OK"}:m);
  }
  save("machines",machines);
  // Upload foto ke Firebase Storage jika ada foto baru (base64)
  const hasFotoB64 = (rec.fotos||[]).some(f=>f.startsWith('data:'));
  if(hasFotoB64 && _currentUser && storage){
    uploadFotosArray(rec.fotos, `history_${rec.caseId}`).then(urls=>{
      rec.fotos = urls;
      if(editId)history=history.map(h=>h.caseId===editId?rec:h);
      else history=[...history,rec];
      save("history",history);renderHistory();
    });
  } else {
    if(editId)history=history.map(h=>h.caseId===editId?rec:h);
    else history=[...history,rec];
    save("history",history);renderHistory();
  }
  closeModal();
}
function delHistory(id){
  if(!confirm("Hapus?"))return;
  const h=history.find(x=>x.caseId===id);
  history=history.filter(x=>x.caseId!==id);
  if(h){const rem=history.filter(x=>x.mesinId===h.mesinId&&(x.status==="Proses"||x.status==="Pending"));if(!rem.length)machines=machines.map(m=>m.id===h.mesinId?{...m,status:"OK"}:m);}
  save("machines",machines);save("history",history);renderHistory();
}
function getFilteredHistory(){
  return history.filter(h=>{
    const mm=histFM==="Semua"||h.mesinId===histFM;
    const ms=histFS==="Semua"||h.status===histFS;
    const mt=histFT==="Semua"||h.tipeKerja===histFT;
    const ma=histFA==="Semua"||h.area===histFA;
    const mp=histFP==="Semua"||(h.tanggal||"").startsWith(histFP);
    const mq=!histQ||(h.caseId||"").toLowerCase().includes(histQ.toLowerCase())||(h.mesinId||"").toLowerCase().includes(histQ.toLowerCase())||(h.keterangan||"").toLowerCase().includes(histQ.toLowerCase());
    return mm&&ms&&mt&&ma&&mp&&mq;
  });
}

// ═══ EXPORT FOTO ZIP ══════════════════════════════════════════════════════
async function exportFotoZip(label){
  const data=getFilteredHistory();
  // Cek ada foto atau tidak
  const withFoto=data.filter(h=>h.fotos&&h.fotos.length>0);
  if(!withFoto.length){
    showToastMsg("⚠️ Tidak ada foto"+(label&&label!=="Semua"?" pada filter ini":""));
    return;
  }

  // Cek JSZip tersedia
  if(typeof JSZip==="undefined"){
    showToastMsg("⚠️ JSZip tidak tersedia. Cek koneksi internet.");
    return;
  }

  showToastMsg("📦 Menyiapkan ZIP foto...");

  const zip=new JSZip();
  let totalFoto=0;

  withFoto.forEach(h=>{
    const m=machines.find(x=>x.id===h.mesinId);
    const folderName=`${h.caseId}_${h.mesinId}_${h.tanggal||"nodate"}`;
    const folder=zip.folder(folderName);

    const info=[
      `Case ID  : ${h.caseId}`,
      `Tanggal  : ${h.tanggal||"-"}`,
      `Mesin    : ${h.mesinId} — ${m?m.merk:"-"} (${h.area||"-"})`,
      `Jenis    : ${h.jenisKerusakan||"-"}`,
      `Area     : ${h.areaKerusakan||"-"}`,
      `Detail   : ${Array.isArray(h.detailKerusakan)?h.detailKerusakan.map(d=>d.replace(/ -.*$/,"")).join(", "):(h.detailKerusakan||"-")}`,
      `Keterangan: ${h.keterangan||"-"}`,
      `Teknisi  : ${h.teknisi||"-"}`,
      `Downtime : ${fmtMin(h.downtime)}`,
      `Status   : ${h.status||"-"}`,
    ].join("\n");
    folder.file("INFO.txt",info);

    h.fotos.forEach((b64,idx)=>{
      const parts=b64.split(",");
      const ext=(parts[0]||"").includes("png")?"png":"jpg";
      const data=parts[1]||"";
      folder.file(`foto_${String(idx+1).padStart(2,"0")}.${ext}`,data,{base64:true});
      totalFoto++;
    });
  });

  try{
    const blob=await zip.generateAsync({type:"blob",compression:"DEFLATE",compressionOptions:{level:6}});
    const tgl=new Date().toISOString().slice(0,10);
    const fname="CMMS_Foto"+(label&&label!=="Semua"?"_"+label:"")+"_"+tgl+".zip";
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=fname;
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),5000);
    showToastMsg(`✅ ZIP berhasil! ${withFoto.length} kasus · ${totalFoto} foto`);
  }catch(e){
    showToastMsg("❌ Gagal membuat ZIP: "+e.message);
  }
}

// Hitung nextDue berdasarkan lastDone + frekuensi
function calcNextDue(lastDone, frekuensi){
  if(!lastDone)return"";
  const d=new Date(lastDone);
  const f={"Harian":1,"Mingguan":7,"Bulanan":30,"3 Bulanan":90,"6 Bulanan":180,"Tahunan":365};
  d.setDate(d.getDate()+(f[frekuensi]||30));
  return d.toISOString().split("T")[0];
}

// Hitung status PM otomatis berdasarkan nextDue
function calcPMStatus(nextDue){
  if(!nextDue)return"Mendatang";
  const diff=Math.round((new Date(nextDue)-new Date(today()))/(1000*60*60*24));
  if(diff<0)return"Terlambat";
  if(diff<=7)return"Jatuh Tempo";
  return"Mendatang";
}

// Update semua status PM setiap render
function refreshPMStatus(){
  let changed=false;
  preventive=preventive.map(p=>{
    const ns=calcPMStatus(p.nextDue);
    if(ns!==p.status){changed=true;return{...p,status:ns};}
    return p;
  });
  if(changed)ss("pm",preventive);
}

              <div class="bar-bg"><div class="bar-fill" style="background:${pct===100?"#059669":"#0891b2"};width:${pct}%"></div></div>

  document.getElementById("pg-preventive").innerHTML=html;

function loadPMTemplate(){
  const mesinId=document.getElementById("bulk-mesin").value;
  if(!mesinId){document.getElementById("bulk-template-area").innerHTML='<div style="color:#475569;font-size:.78rem">Pilih mesin dulu</div>';return;}
  const m=machines.find(x=>x.id===mesinId);
  const tpl=PM_TEMPLATE[m?m.type:"DEFAULT"]||PM_TEMPLATE["DEFAULT"];
  const colors={"Harian":"#22d3ee","Mingguan":"#6ee7b7","Bulanan":"#fbbf24","3 Bulanan":"#f87171","6 Bulanan":"#d8b4fe","Tahunan":"#fb923c"};
  let html=`<div style="font-size:.72rem;color:#64748b;margin-bottom:8px">Pilih aktivitas yang akan dijadwalkan:</div>`;
  tpl.forEach((grp,gi)=>{
    html+=`<div style="margin-bottom:10px">
      <div style="font-size:.72rem;font-weight:700;color:${colors[grp.kat]||"#94a3b8"};margin-bottom:5px;text-transform:uppercase">${grp.kat}</div>`;
    grp.items.forEach((item,ii)=>{
      const key=`bulk-${gi}-${ii}`;
      // Cek apakah sudah ada PM ini untuk mesin ini
      const exists=preventive.some(p=>p.machineId===mesinId&&p.aktivitas===item);
      html+=`<label style="display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;background:rgba(2,6,23,.4);margin-bottom:3px;cursor:${exists?"default":"pointer"};opacity:${exists?".45":"1"}">
        <input type="checkbox" id="${key}" value="${item}" data-frek="${grp.kat}" ${exists?"disabled checked":""} style="accent-color:#0891b2">
        <span style="font-size:.75rem;flex:1">${item}</span>
        ${exists?'<span style="font-size:.6rem;color:#22d3ee">✓ Ada</span>':''}
      </label>`;
    });
    html+="</div>";
  });
  document.getElementById("bulk-template-area").innerHTML=html;
}

function savePMBulk(){
  const mesinId=document.getElementById("bulk-mesin").value;
  const tek=document.getElementById("bulk-tek").value;
  const start=document.getElementById("bulk-start").value||today();
  if(!mesinId){alert("Pilih mesin dulu!");return;}
  const checkboxes=document.querySelectorAll('#bulk-template-area input[type=checkbox]:checked:not(:disabled)');
  if(!checkboxes.length){alert("Pilih minimal 1 aktivitas!");return;}
  let added=0;
  checkboxes.forEach(cb=>{
    const frek=cb.dataset.frek;
    const nextId="PM"+String(Date.now()+added).slice(-6);
    const rec={id:nextId,machineId:mesinId,aktivitas:cb.value,frekuensi:frek,lastDone:"",nextDue:calcNextDue(start,frek),teknisi:tek,status:"Mendatang",checklist:[],catatan:""};
    preventive=[...preventive,rec];
    added++;
  });
  ss("pm",preventive);closeModal();renderPreventive();
  showToastMsg(`✅ ${added} jadwal PM berhasil ditambahkan`);
}

function savePM(id){
  const isEdit=id&&preventive.some(p=>p.id===id);
  const nextId=id||(  "PM"+String(Date.now()).slice(-6));
  const rec={
    id:nextId,
    machineId:document.getElementById("pm-mesin").value,
    aktivitas:document.getElementById("pm-akt").value,
    frekuensi:document.getElementById("pm-frek").value,
    lastDone:document.getElementById("pm-last").value,
    nextDue:document.getElementById("pm-next").value||calcNextDue(document.getElementById("pm-last").value,document.getElementById("pm-frek").value),
    teknisi:document.getElementById("pm-tek").value,
    catatan:document.getElementById("pm-cat")?document.getElementById("pm-cat").value:"",
    status:calcPMStatus(document.getElementById("pm-next").value),
    checklist:isEdit?(preventive.find(p=>p.id===id).checklist||[]):[]
  };
  if(isEdit)preventive=preventive.map(p=>p.id===id?rec:p);
  else preventive=[...preventive,rec];
  ss("pm",preventive);closeModal();renderPreventive();

let _pmFotosState=[];
function handlePMFoto(event){
  const files=Array.from(event.target.files);
  files.slice(0,3-_pmFotosState.length).forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const MAX=1000;let w=img.width,h=img.height;
        if(w>MAX||h>MAX){const r=Math.min(MAX/w,MAX/h);w=Math.round(w*r);h=Math.round(h*r);}
        const canvas=document.createElement("canvas");canvas.width=w;canvas.height=h;
        canvas.getContext("2d").drawImage(img,0,0,w,h);
        _pmFotosState.push(canvas.toDataURL("image/jpeg",.8));
        _refreshPMFotoGrid();
      };img.src=e.target.result;
    };reader.readAsDataURL(file);
  });event.target.value="";
}
function _refreshPMFotoGrid(){
  const grid=document.getElementById("pm-foto-grid");
  const addBtn=document.getElementById("pm-foto-add");
  if(!grid)return;
  grid.querySelectorAll(".foto-thumb").forEach(el=>el.remove());
  _pmFotosState.forEach((f,i)=>{
    const div=document.createElement("div");div.className="foto-thumb";
    div.innerHTML=`<img src="${f}" onclick="openFotoViewer('${f}','PM Foto ${i+1}')"/><button class="del-foto" onclick="_pmFotosState.splice(${i},1);_refreshPMFotoGrid()">×</button>`;
    grid.insertBefore(div,addBtn);
  });
  if(addBtn)addBtn.style.display=_pmFotosState.length>=3?"none":"";
}

let _clState={id:null,checklist:[],fotos:[]};
function completePM(id){
  const p=preventive.find(x=>x.id===id);if(!p)return;

  // Baca field dari form
  const tglExec=(document.getElementById("pm-tgl-exec")||{}).value||today();
  const teknisi=(document.getElementById("pm-teknisi")||{}).value||"";
  const shift=(document.getElementById("pm-shift")||{}).value||"";
  const area=(document.getElementById("pm-area")||{}).value||"";
  const catatan=(document.getElementById("pm-catatan")||{}).value||"";

  // Cek ada item kondisi K (Kurang) — warn saja, tidak blokir
  const kurang=_clState.checklist.filter(c=>c.kondisi==="K"||c.kondisi==="T");
  const allOK=!kurang.length;

  const doSave=()=>{
    const nextDue=calcNextDue(tglExec,p.frekuensi);
    // Tandai semua done=true jika kondisi B/C, false jika K/T
    const clSave=_clState.checklist.map(c=>({...c,done:c.kondisi!=="K"&&c.kondisi!=="T"}));

    preventive=preventive.map(pm=>{
      if(pm.id!==id)return pm;
      return{...pm,
        lastDone:tglExec,nextDue,
        status:calcPMStatus(nextDue),
        teknisi,shift,area,catatan,
        checklist:clSave.map(c=>({...c})),
        fotos:_pmFotosState||[],
      };
    });
    ss("pm",preventive);

    // Buat history record
    const m=machines.find(x=>x.id===p.machineId);
    const caseId=nextCaseId();
    const kurangItems=kurang.map(c=>`${c.kondisi==="K"?"⚠️":"🔧"} ${c.text}${c.ket?" ("+c.ket+")":""}`);
    const ket=[
      `PM ${p.frekuensi}: ${p.aktivitas}`,
      kurangItems.length?`Temuan: ${kurangItems.join("; ")}`:"Semua item kondisi baik",
      catatan?`Catatan: ${catatan}`:"",
    ].filter(Boolean).join(" | ");

    const histRec={
      caseId,tanggal:tglExec,
      mesinId:p.machineId,merk:m?m.merk:"",area:m?m.area:"",
      tipeKerja:"PREVENTIVE",jenisKerusakan:"-",
      areaKerusakan:"PM Rutin",detailKerusakan:p.aktivitas,
      keterangan:ket,teknisi,shift:shift||"-",
      timeStart:"",timeFinish:"",tanggalSelesai:tglExec,downtime:0,
      status:"Selesai",fotos:_pmFotosState||[],
      partNama:"",partStatus:"—",pmId:id,
    };
    const doFinishPM = (rec) => {
      history=[rec,...history];
      save("history",history);
      if(m){machines=machines.map(mc=>mc.id===p.machineId?{...mc,status:"OK"}:mc);save("machines",machines);}
      showToast("✅ PM tersimpan & jadwal diperbarui");
      closeModal();renderPreventive();
    };
    const hasPMFotoB64 = (histRec.fotos||[]).some(f=>f.startsWith('data:'));
    if(hasPMFotoB64 && _currentUser && storage){
      uploadFotosArray(histRec.fotos, `pm_${caseId}`).then(urls=>{
        histRec.fotos=urls; doFinishPM(histRec);
      });
    } else { doFinishPM(histRec); }
  };

  if(kurang.length){
    cmmsConfirm(
      "Ada Temuan K / T",
      `${kurang.length} item kondisi Kurang/Perlu Tambah:\n${kurang.map(c=>c.text).join(", ")}\n\nTetap simpan?`,
      "Ya, Simpan"
    ).then(ok=>{if(ok)doSave();});
  } else {
    doSave();
  }
}

    ss("pm",preventive);renderPreventive();

}

function _spUpdateTable(){
  const kritis=spareparts.filter(s=>s.minStok>0&&s.stok<=s.minStok).length;
  const filtered=spareparts.filter(s=>{
    const q=spQ.toLowerCase();
    const mq=s.nama.toLowerCase().includes(q)||s.kode.toLowerCase().includes(q);
    const mf=spFilt==="Semua"?true:spFilt==="Kritis"?s.stok<=s.minStok&&s.minStok>0:s.kategori===spFilt;
    const mk=spKosong?s.stok===0:true;
    const ml=spLokFilt==="Semua"?true:s.lokasi===spLokFilt;
    return mq&&mf&&ml&&mk;
  });

  // Stats
  const statsEl=document.getElementById("sp-stats");
  if(statsEl) statsEl.innerHTML=`
    <div class="card" style="padding:9px;text-align:center"><div style="font-weight:900;font-size:1.1rem">${spareparts.length}</div><div style="font-size:.65rem;color:#64748b">Total Item</div></div>
    <div class="card" style="padding:9px;text-align:center;border-color:rgba(185,28,28,.4)"><div style="font-weight:900;font-size:1.1rem;color:#f87171">${kritis}</div><div style="font-size:.65rem;color:#64748b">Kritis</div></div>
    <div class="card" style="padding:9px;text-align:center"><div style="font-weight:700;font-size:.78rem">${filtered.length}</div><div style="font-size:.65rem;color:#64748b">Tampil</div></div>`;

  // Info
  const infoEl=document.getElementById("sp-info");
  if(infoEl) infoEl.innerHTML=`Menampilkan <strong style="color:#e2e8f0">${filtered.length}</strong> dari ${spareparts.length} item`
    +(spFilt!=="Semua"?` · Kategori: <span style="color:#22d3ee">${spFilt}</span>`:"")
    +(spLokFilt!=="Semua"?` · Lokasi: <span style="color:#22d3ee">${spLokFilt}</span>`:"")
    +(spKosong?` · <span style="color:#f87171">Stok Kosong</span>`:"");

  // Update chips aktif tanpa rebuild
  document.querySelectorAll("#sp-chips-kat .chip").forEach(b=>{
    b.classList.toggle("on", b.textContent.replace("🔴 ","")===spFilt||(spFilt==="Kritis"&&b.textContent.includes("🔴")));
  });
  document.querySelectorAll("#sp-chips-lok .chip").forEach(b=>{
    b.classList.toggle("on", b.textContent===spLokFilt);
  });

  // Tbody saja yang diganti
  let rows="";
  filtered.forEach(s=>{
    const isKritis=s.minStok>0&&s.stok<=s.minStok;
    const isGear=s.kategori==="Gear";
    const _skLen=(()=>{try{const k=localStorage.getItem("cmmsL_sketch_"+s.id);return k?JSON.parse(k).length:0;}catch(e){return 0;}})();
    const hasSketch=isGear&&((s.sketches&&s.sketches.length)||_skLen||(s.sketchLink));
    rows+=`<tr${isKritis?' style="background:rgba(127,29,29,.08)"':""}>
      <td style="color:#22d3ee;font-size:.68rem;font-weight:700;white-space:nowrap">${s.kode}</td>
      <td>
        <div style="font-weight:700;font-size:.75rem">${s.nama}</div>
        <div style="font-size:.62rem;color:#64748b;margin-top:1px">
          <span class="badge b-slate" style="font-size:.58rem">${s.kategori}</span>
          <span style="color:#475569"> · ${s.satuan}</span>
        </div>
        ${isGear?`<div style="font-size:.6rem;margin-top:2px">
          ${s.gearJenis&&s.gearJenis!=="—"?`<span style="color:#94a3b8">⚙️ ${s.gearJenis}</span> `:""}
          ${s.gearMesinJenis?`<span style="color:#64748b">· ${s.gearMesinJenis}${s.gearMesinMerk?` / ${s.gearMesinMerk}`:""}</span>`:""}
          <br/>${hasSketch?'<span style="color:#22d3ee">📐 Ada Sketch</span>':'<span style="color:#475569">📐 Belum ada sketch</span>'}
          ${s.gearKet?`<br/><span style="color:#64748b;font-style:italic">${s.gearKet.slice(0,40)}${s.gearKet.length>40?"…":""}</span>`:""}
        </div>`:""}
        ${isKritis?`<div style="font-size:.6rem;color:#f87171;margin-top:1px">⚠ Kritis</div>`:""}
      </td>
      <td style="text-align:center"><span class="badge b-blue" style="font-size:.6rem">${s.lokasi||"—"}</span></td>
      <td style="text-align:center">
        <div class="stk">
          <button onclick="adjSP('${s.id}',-1)">−</button>
          <span style="font-weight:700;min-width:22px;text-align:center;color:${isKritis?"#f87171":"#6ee7b7"}">${s.stok}</span>
          <button onclick="adjSP('${s.id}',1)">+</button>

          <button class="btn-sm btn-edit" onclick="openEditSP('${s.id}')">✏ Edit</button>

          <button class="btn-sm btn-del" onclick="delSP('${s.id}')">✕</button>
        </div>
      </td>
    </tr>`;
  });

  const tbody=document.getElementById("sp-tbody");
  if(tbody) tbody.innerHTML=rows;
  const empty=document.getElementById("sp-empty");
  if(empty) empty.style.display=filtered.length===0?"block":"none";

  const chipKosong=document.getElementById("sp-chip-kosong");
  if(chipKosong) chipKosong.classList.toggle("on",spKosong);

  // Update chips kat/lok aktif
  document.querySelectorAll("#sp-chips-kat .chip").forEach(b=>{
    const label=b.textContent.replace("🔴 ","").trim();
    b.classList.toggle("on",label===spFilt);
  });
  document.querySelectorAll("#sp-chips-lok .chip").forEach(b=>{
    b.classList.toggle("on",b.textContent.trim()===spLokFilt);
  });
}

function handleSpSketchInput(event){
  const files=Array.from(event.target.files);
  const remaining=5-_spFotos.length;
  const toProcess=files.slice(0,remaining);
  let loaded=0;
  toProcess.forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const MAX=1200;
        let w=img.width,h=img.height;
        if(w>MAX||h>MAX){const r=Math.min(MAX/w,MAX/h);w=Math.round(w*r);h=Math.round(h*r);}
        const canvas=document.createElement("canvas");
        canvas.width=w;canvas.height=h;
        canvas.getContext("2d").drawImage(img,0,0,w,h);
        const b64=canvas.toDataURL("image/jpeg",0.8);
        _spFotos.push(b64);
        loaded++;
        if(loaded===toProcess.length)refreshSpSketchGrid();
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
  event.target.value="";
}

function refreshSpSketchGrid(){
  const grid=document.getElementById("sp-sketch-grid");
  const addBtn=document.getElementById("sp-sketch-add-btn");
  if(!grid)return;
  grid.querySelectorAll(".foto-thumb").forEach(el=>el.remove());
  _spFotos.forEach((f,i)=>{
    const div=document.createElement("div");
    div.className="foto-thumb";
    div.innerHTML=`<img src="${f}" onclick="openFotoViewer('${f}','Sketch ${i+1}')"/><button class="del-foto" onclick="delSpSketch(${i})">×</button>`;
    grid.insertBefore(div,addBtn);
  });
  if(addBtn)addBtn.style.display=_spFotos.length>=5?"none":"";
}

function delSpSketch(i){_spFotos.splice(i,1);refreshSpSketchGrid();}

function saveSketchOnly(id){
  const link=document.getElementById("s-sketch-link").value.trim();
  const doSaveSketch = async (urls) => {
    if(_currentUser && storage && urls.length>0){
      // simpan URL di sparepart langsung, tidak perlu localStorage
      spareparts=spareparts.map(s=>s.id===id?{...s,sketches:urls,sketchLink:link}:s);
    } else {
      try{
        if(urls.length>0) localStorage.setItem("cmmsL_sketch_"+id,JSON.stringify(urls));
        else localStorage.removeItem("cmmsL_sketch_"+id);
      }catch(e){ showToastMsg("⚠️ Foto sketch tidak tersimpan (storage penuh)"); }
      spareparts=spareparts.map(s=>s.id===id?{...s,sketches:[],sketchLink:link}:s);
    }
    spFilt="Gear"; spQ="";
    save("sp",spareparts);showToast("✅ Sketch tersimpan");closeModal();renderSparepart();
  };
  const hasB64 = _spFotos.some(f=>f.startsWith('data:'));
  if(hasB64 && _currentUser && storage){
    uploadFotosArray(_spFotos, `sketch_${id}`).then(urls=>doSaveSketch(urls));
  } else { doSaveSketch(_spFotos); }
}

function sortSP(arr){return arr.slice().sort((a,b)=>a.kode.localeCompare(b.kode,'id',{numeric:true,sensitivity:'base'}));}

function saveSP(id){
  const kat=document.getElementById("s-kat").value;
  const isGear=kat==="Gear";
  const sketchLink=document.getElementById("s-sketch-link")?document.getElementById("s-sketch-link").value.trim():"";
  const prev=editId?spareparts.find(x=>x.id===editId):null;
  const recId=editId||id;
  const rec={
    id:recId,
    kode:document.getElementById("s-kode").value,
    nama:document.getElementById("s-nama").value,
    kategori:kat,
    satuan:document.getElementById("s-sat").value,
    stok:+document.getElementById("s-stok").value,
    minStok:+document.getElementById("s-min").value,
    harga:+document.getElementById("s-harga").value,
    lokasi:document.getElementById("s-lok").value,
    supplier:document.getElementById("s-sup").value,
    sketches:[], // SELALU kosong di array utama — foto disimpan terpisah
    sketchLink:isGear?sketchLink:(prev?prev.sketchLink||"":""),
    gearKet:isGear?(document.getElementById("s-gear-ket")?document.getElementById("s-gear-ket").value:""):(prev?prev.gearKet||"":""),
    gearJenis:isGear?(document.getElementById("s-gear-jenis")?document.getElementById("s-gear-jenis").value:"—"):(prev?prev.gearJenis||"":""),
    gearMesinJenis:isGear?(document.getElementById("s-gear-mesin-jenis")?document.getElementById("s-gear-mesin-jenis").value:""):(prev?prev.gearMesinJenis||"":""),
    gearMesinMerk:isGear?(document.getElementById("s-gear-mesin-merk")?document.getElementById("s-gear-mesin-merk").value:""):(prev?prev.gearMesinMerk||"":""),
  };
  // Simpan foto sketch terpisah (tidak campur array utama)
  if(isGear){
    try{
      if(_spFotos.length>0) localStorage.setItem("cmmsL_sketch_"+recId,JSON.stringify(_spFotos));
      else localStorage.removeItem("cmmsL_sketch_"+recId);
    }catch(e){ showToastMsg("⚠️ Foto sketch tidak tersimpan (storage penuh)"); }
  }
  if(editId)spareparts=spareparts.map(s=>s.id===editId?rec:s);
  else spareparts=[...spareparts,rec];
  spareparts=sortSP(spareparts);
  spFilt=rec.kategori; spQ="";
  ss("sp",spareparts);showToast();closeModal();renderSparepart();
}

function adjSP(id,d){spareparts=spareparts.map(s=>s.id===id?{...s,stok:Math.max(0,s.stok+d)}:s);ss("sp",spareparts);renderSparepart();}
async function delSP(id){const ok=await cmmsConfirm("Hapus Sparepart","Yakin hapus part ini?","Hapus");if(ok){spareparts=spareparts.filter(s=>s.id!==id);spareparts=sortSP(spareparts);ss("sp",spareparts);renderSparepart();}}
function exportSP(data,labelSuffix){
  const rows=data||spareparts;
  const suf=labelSuffix||"Semua";
  dlCSV([
    ["ID","KODE","NAMA","KATEGORI","SATUAN","STOK","MIN STOK","HARGA","NILAI TOTAL","LOKASI","SUPPLIER",
     "GEAR JENIS","GEAR MESIN","GEAR MERK MESIN","GEAR KETERANGAN","SKETCH LINK"],
    ...rows.map(s=>[
      s.id,s.kode,s.nama,s.kategori,s.satuan,s.stok,s.minStok,s.harga||0,(s.stok*(s.harga||0)),
      s.lokasi,s.supplier||"",s.gearJenis||"",s.gearMesinJenis||"",s.gearMesinMerk||"",s.gearKet||"",s.sketchLink||""
    ])
  ],"Stock_Sparepart_"+suf);
}
function exportSPFiltered(){
  // ambil data yang sedang ditampilkan sesuai filter aktif
  const q=spQ.toLowerCase();
  const rows=spareparts.filter(s=>{
    const mq=s.nama.toLowerCase().includes(q)||s.kode.toLowerCase().includes(q);
    const mf=spFilt==="Semua"?true:spFilt==="Kritis"?s.stok<=s.minStok&&s.minStok>0:s.kategori===spFilt;
    const ml=spLokFilt==="Semua"?true:s.lokasi===spLokFilt;
    const mk=spKosong?s.stok===0:true;
    return mq&&mf&&ml&&mk;
  });
  const parts=[spFilt!=="Semua"?spFilt:"",spLokFilt!=="Semua"?spLokFilt:"",spKosong?"Kosong":"",spQ?("Cari-"+spQ):""].filter(Boolean);
  exportSP(rows,parts.length?parts.join("_"):"Filter");
}

let auditPeriod="Semua";
let _auditCache={period:null,histLen:0,html:null}; // lazy cache

function renderAudit(){
  const periods=["Semua",...[...new Set(history.map(h=>h.tanggal?.slice(0,7)))].sort().reverse()];
  // Lazy: skip kalkulasi jika periode & data tidak berubah
  if(_auditCache.period===auditPeriod && _auditCache.histLen===history.length && _auditCache.html){
    // Cukup update selector periode saja
    document.getElementById("pg-audit").innerHTML=_auditCache.html;
    return;
  }
  const filtered=auditPeriod==="Semua"?history:history.filter(h=>(h.tanggal||"").startsWith(auditPeriod));
  const totalKasus=filtered.length;
  const corrective=filtered.filter(h=>h.tipeKerja==="CORRECTIVE").length;
  const preventif=filtered.filter(h=>h.tipeKerja==="PREVENTIVE").length;
  const totalDT=filtered.reduce((a,h)=>a+(h.downtime||0),0);
  const selesai=filtered.filter(h=>h.status==="Selesai").length;
  const pmDone=preventive.filter(p=>p.status==="Mendatang").length;
  const pmComp=preventive.length?Math.round(pmDone/preventive.length*100):0;

  // Rankings
  const rankMachine=()=>{const map={};filtered.filter(h=>h.tipeKerja==="CORRECTIVE").forEach(h=>{map[h.mesinId]=(map[h.mesinId]||0)+1;});return Object.entries(map).map(([id,c])=>{const m=machines.find(x=>x.id===id);return{id,c,type:m?.type||"-",merk:m?.merk||"-"};}).sort((a,b)=>b.c-a.c)};
  const rankDT=()=>{const map={};filtered.forEach(h=>{map[h.mesinId]=(map[h.mesinId]||0)+(h.downtime||0);});return Object.entries(map).map(([id,dt])=>{const m=machines.find(x=>x.id===id);return{id,dt,type:m?.type||"-",merk:m?.merk||"-"};}).sort((a,b)=>b.dt-a.dt).slice(0,8);};
  const rankArea=()=>{const map={};filtered.forEach(h=>{const k=h.areaKerusakan||"Tdk Tercatat";map[k]=(map[k]||0)+1;});return Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,8);};
  const rankDetail=()=>{const map={};filtered.forEach(h=>{const items=Array.isArray(h.detailKerusakan)?h.detailKerusakan:[h.detailKerusakan||""];items.filter(Boolean).forEach(d=>{const k=d.replace(/ -.*$/,"")||"Tdk Tercatat";map[k]=(map[k]||0)+1;});});return Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,8);};
  const rankJenis=()=>{const map={};filtered.forEach(h=>{const k=h.jenisKerusakan||"Tdk Tercatat";map[k]=(map[k]||0)+1;});return Object.entries(map).sort((a,b)=>b[1]-a[1]);};

  const rcl=i=>i===0?"r1":i===1?"r2":i===2?"r3":"rn";
  const rankByType=["BUBUT","MILLING","CRANE","LAS MIG","LAS TIG","VERTICAL BORING","RADIAL DRILLING","CUTTING TORCH"].map(t=>{
    const list=machines.filter(m=>m.type===t);
    const ranked=list.map(m=>{const c=filtered.filter(h=>h.mesinId===m.id&&h.tipeKerja==="CORRECTIVE").length;const dt=filtered.filter(h=>h.mesinId===m.id).reduce((a,h)=>a+(h.downtime||0),0);return{id:m.id,merk:m.merk,c,dt};}).filter(x=>x.c>0).sort((a,b)=>b.c-a.c).slice(0,3);
    return{type:t,ranked};
  }).filter(x=>x.ranked.length>0);

  let html=`
  <div class="hrow">
    <div><div style="font-size:1.2rem;font-weight:900">Laporan <span style="color:#22d3ee">Audit</span></div><div style="font-size:.75rem;color:#64748b">Analisis lengkap</div></div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <select onchange="_auditCache.html=null;auditPeriod=this.value;renderAudit()" style="background:#1e293b;border:1px solid #334155;color:#e2e8f0;border-radius:7px;padding:6px 9px;font-size:.78rem;outline:none">
        ${periods.map(p=>`<option${p===auditPeriod?" selected":""}>${p}</option>`).join("")}
      </select>
      <button class="btn btn-green" onclick="exportAudit()">📊 Export Full</button>
      <button class="btn btn-cyan" onclick="openAuditSummary()">📋 1 Lembar</button>
    </div>
  </div>
  <div style="background:rgba(8,145,178,.07);border:1px solid rgba(8,145,178,.2);border-radius:11px;padding:11px;margin-bottom:12px">
    <div class="sec cyan">📋 Ringkasan — ${auditPeriod}</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">
      ${[["Total Kasus",totalKasus,"#22d3ee"],["Corrective",corrective,"#f87171"],["Preventive",preventif,"#86efac"],["Total Downtime",fmtMin(totalDT),"#fbbf24"],["Selesai",selesai,"#34d399"],["PM Compliance",pmComp+"%",pmComp>=80?"#34d399":"#f87171"]].map(([l,v,c])=>`<div style="background:rgba(2,6,23,.5);border-radius:7px;padding:8px;text-align:center"><div style="font-weight:900;font-size:1rem;color:${c}">${v}</div><div style="font-size:.62rem;color:#64748b">${l}</div></div>`).join("")}
    </div>
  </div>`;

  if(!totalKasus){html+=`<div class="card" style="text-align:center;color:#475569;font-style:italic;padding:24px">Belum ada data. Tambahkan History Card dulu.</div>`;document.getElementById("pg-audit").innerHTML=html;return;}

  html+=`<div class="sec cyan">🏆 Ranking Mesin Sering Rusak per Tipe</div>`;
  if(!rankByType.length)html+=`<div style="color:#475569;font-size:.78rem;margin-bottom:10px;font-style:italic">Belum ada data kerusakan corrective</div>`;
  rankByType.forEach(({type,ranked})=>{
    html+=`<div class="card" style="margin-bottom:8px"><div style="font-weight:700;color:#22d3ee;font-size:.8rem;margin-bottom:7px">⚙️ ${type}</div>`;
    ranked.forEach((m,i)=>{html+=`<div class="rank-item"><div class="${rcl(i)} rnum">${i+1}</div><div style="flex:1"><div style="font-weight:700;font-size:.78rem">${m.id}</div><div style="font-size:.65rem;color:#64748b">${m.merk}</div></div><div style="text-align:right"><div style="color:#f87171;font-weight:700;font-size:.78rem">${m.c}x rusak</div><div style="font-size:.63rem;color:#fbbf24">${fmtMin(m.dt)}</div></div></div>`;});
    html+=`</div>`;
  });

  html+=`<div class="sec red">⏱ Top Downtime Terlama</div><div class="card" style="margin-bottom:12px">`;
  rankDT().forEach((x,i)=>{html+=`<div class="rank-item"><div class="${rcl(i)} rnum">${i+1}</div><div style="flex:1"><div style="font-weight:700;font-size:.78rem">${x.id} <span style="color:#64748b;font-weight:400">${x.merk}</span></div><div style="font-size:.65rem;color:#64748b">${x.type}</div></div><div style="font-weight:700;color:#fbbf24">${fmtMin(x.dt)}</div></div>`;});
  html+=`</div>`;

  html+=`<div class="sec amber">📍 Ranking Area Kerusakan</div><div class="card" style="margin-bottom:12px">`;
  rankArea().forEach(([k,v],i)=>{
    // Mesin mana yang paling sering rusak di area ini
    const mesinDiArea=filtered.filter(h=>h.areaKerusakan===k).map(h=>{const m=machines.find(x=>x.id===h.mesinId);return m?`${m.id} (${m.type})`:h.mesinId;});
    const topMesin=[...new Set(mesinDiArea)].slice(0,2).join(", ");
    html+=`<div class="rank-item"><div class="${rcl(i)} rnum">${i+1}</div><div style="flex:1"><div style="font-size:.76rem;font-weight:600">${k}</div>${topMesin?`<div style="font-size:.6rem;color:#64748b">Mesin: ${topMesin}</div>`:""}</div><div style="font-weight:700;color:#fbbf24">${v}x</div></div>`;
  });
  html+=`</div>`;

  html+=`<div class="sec amber">🔩 Ranking Komponen/Part Rusak</div><div class="card" style="margin-bottom:12px">`;
  rankDetail().forEach(([k,v],i)=>{
    const tipeYgRusak=[...new Set(filtered.filter(h=>(Array.isArray(h.detailKerusakan)?h.detailKerusakan:[h.detailKerusakan||""]).some(d=>(d.replace(/ -.*$/,"")||"")=== k)).map(h=>{const m=machines.find(x=>x.id===h.mesinId);return m?.type||""}))].filter(Boolean).join(", ");
    html+=`<div class="rank-item"><div class="${rcl(i)} rnum">${i+1}</div><div style="flex:1"><div style="font-size:.76rem;font-weight:600">${k}</div>${tipeYgRusak?`<div style="font-size:.6rem;color:#64748b">Tipe: ${tipeYgRusak}</div>`:""}</div><div style="font-weight:700;color:#fbbf24">${v}x</div></div>`;
  });
  html+=`</div>`;

  html+=`<div class="sec">⚠️ Distribusi Jenis Kerusakan</div><div class="card">`;
  const jk=rankJenis();
  const colMap={MEKANIK:"#fbbf24",ELEKTRIK:"#93c5fd",HIDROLIK:"#6ee7b7",PNEUMATIK:"#d8b4fe",LAINNYA:"#94a3b8"};
  jk.forEach(([k,v])=>{const pct=totalKasus?Math.round(v/totalKasus*100):0;const c=colMap[k]||"#94a3b8";html+=`<div class="bar-row"><div class="bar-label"><span>${k}</span><span style="color:${c};font-weight:700">${v}x (${pct}%)</span></div><div class="bar-bg"><div class="bar-fill" style="background:${c};width:${pct}%"></div></div></div>`;});
  html+=`</div>`;

  // ── Log Order Part per Tipe Mesin ──
  const partOrders=filtered.filter(h=>h.partNama);
  if(partOrders.length){
    html+=`<div class="sec cyan">📦 Log Order Part</div>`;
    // group by mesin type
    const byType={};
    partOrders.forEach(h=>{
      const m=machines.find(x=>x.id===h.mesinId);
      const t=m?.type||"Lainnya";
      if(!byType[t])byType[t]=[];
      byType[t].push(h);
    });
    Object.entries(byType).forEach(([type,orders])=>{
      html+=`<div class="card" style="margin-bottom:8px">
        <div style="font-weight:700;color:#22d3ee;font-size:.78rem;margin-bottom:6px">⚙️ ${type} <span style="color:#475569;font-weight:400;font-size:.68rem">(${orders.length} order)</span></div>`;
      orders.forEach(h=>{
        const m=machines.find(x=>x.id===h.mesinId);
        const statusClr=(h.partStatus||"Menunggu")==="Sudah Datang"?"#6ee7b7":"#fbbf24";
        html+=`<div style="border-top:1px solid #1e293b;padding:5px 0;display:grid;grid-template-columns:1fr auto;gap:4px;align-items:start">
          <div>
            <div style="font-size:.72rem;font-weight:700;color:#e2e8f0">${h.partNama}</div>
            <div style="font-size:.62rem;color:#64748b">${h.mesinId} · ${m?.merk||"—"} · ${h.caseId}</div>
            ${h.partQty?`<div style="font-size:.6rem;color:#94a3b8">Qty: ${h.partQty}${h.partSupplier?" · "+h.partSupplier:""}</div>`:""}
            ${h.partTglOrder?`<div style="font-size:.6rem;color:#475569">Order: ${h.partTglOrder}${h.partEta?" → Datang: "+h.partEta:""}</div>`:""}
          </div>
          <span style="font-size:.6rem;padding:2px 6px;border-radius:8px;font-weight:700;background:${statusClr==="6ee7b7"?"rgba(16,185,129,.15)":"rgba(245,158,11,.15)"};color:${statusClr};white-space:nowrap">${(h.partStatus||"Menunggu")==="Sudah Datang"?"✅ Datang":"⏳ Tunggu"}</span>
        </div>`;
      });
      html+=`</div>`;
    });
  }
  _auditCache={period:auditPeriod,histLen:history.length,html};
  document.getElementById("pg-audit").innerHTML=html;
}

function printAuditSummary(){
  const w=window.open('','_blank','width=700,height=900');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Audit Summary</title>
  <style>body{margin:0;padding:0;background:#fff}@media print{body{margin:0}}</style>
  </head><body>${window._auditSummaryHtml}<script>window.onload=()=>window.print();<\/script></body></html>`);
  w.document.close();
}

function dlCSV(rows,fname){
  const csv=rows.map(r=>r.map(c=>`"${String(c||"").replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=fname+".csv";a.click();
}


function archiveOldData(){
  const cutoff=new Date();cutoff.setMonth(cutoff.getMonth()-6);
  const cutoffStr=cutoff.toISOString().slice(0,10);
  const oldDaily=dmLog.filter(r=>r.tanggal&&r.tanggal<cutoffStr);
  const oldHist=history.filter(h=>h.tanggal&&h.tanggal<cutoffStr);
  if(!oldDaily.length&&!oldHist.length){showToastMsg('⚠️ Tidak ada data lama ditemukan');return;}
  cmmsCf(`Arsipkan ${oldDaily.length} Daily + ${oldHist.length} History sebelum ${cutoffStr} ke file JSON, lalu hapus dari app?`,()=>{
    // Download arsip
    const arsip={exportedAt:new Date().toISOString(),cutoff:cutoffStr,dailyLog:oldDaily,historyCard:oldHist};
    const blob=new Blob([JSON.stringify(arsip,null,2)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='CMMS_Arsip_'+cutoffStr+'.json';
    a.click();
    // Hapus dari memori
    dmLog=dmLog.filter(r=>!r.tanggal||r.tanggal>=cutoffStr);
    history=history.filter(h=>!h.tanggal||h.tanggal>=cutoffStr);
    saveDmLog();
    save('history',history);
    showToastMsg(`✅ Arsip berhasil! ${oldDaily.length} Daily + ${oldHist.length} History dihapus`);
    setTimeout(()=>renderSetting(),800);
  });
}
function backupCMMS(includeFoto=true){
  const data={};
  Object.keys(localStorage).forEach(k=>{if(k.startsWith('cmmsL_'))data[k]=localStorage.getItem(k);});

  if(!includeFoto){
    // Hapus field fotos dari history sebelum backup
    try{
      const histKey=Object.keys(data).find(k=>k==="cmmsL_history");
      if(histKey){
        const parsed=JSON.parse(data[histKey]);
        // decompressArr dulu, strip fotos, compress ulang
        const stripped=decompressArr(parsed).map(h=>({...h,fotos:[]}));
        data[histKey]=JSON.stringify(compressArr(stripped));
      }
    }catch(e){console.warn("Strip foto gagal:",e);}
  }

  const json=JSON.stringify(data,null,2);
  const sizeKB=(json.length/1024).toFixed(1);
  const blob=new Blob([json],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='CMMS_Backup'+(includeFoto?"":"_NoFoto")+'_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  showToastMsg(`✅ Backup ${sizeKB} KB${includeFoto?"":" (tanpa foto)"}`);
}
function restoreCMMS(event){
  const file=event.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      Object.keys(data).forEach(k=>localStorage.setItem(k,data[k]));
      alert('Restore berhasil. Aplikasi dimuat ulang.');
      location.reload();
    }catch(err){ alert('File backup tidak valid');}
  };
  reader.readAsText(file);
}
function resetCMMS(){
  cmmsConfirm('🗑 Reset Semua Data','Seluruh data History, PM, Sparepart, dan Mesin akan dihapus permanen. Pastikan sudah backup!','Hapus Semua').then(ok=>{
    if(!ok)return;
    cmmsConfirm('⚠️ Konfirmasi Terakhir','Yakin ingin menghapus semua data?','Ya, Hapus').then(ok2=>{
      if(!ok2)return;
      Object.keys(localStorage).forEach(k=>{ if(k.startsWith('cmmsL_')) localStorage.removeItem(k); });
      dmLog=[];
      location.reload();
    });
  });
}

let _dmLastDate = '';
function dmInitForm(){
  const tgl = document.getElementById('dm-tanggal')?document.getElementById('dm-tanggal').value:'';
  // Reset rows jika tanggal berubah atau rows kosong
  if(dmRows.length===0 || (_dmLastDate && _dmLastDate!==tgl)){
    dmRows=[];
    for(let i=0;i<5;i++) dmRows.push(dmNewRow());
    dmAbsent=new Set();
    // Reset field team & shift
    ['dm-shift','dm-team-sel','dm-prepared','dm-notes'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
    const tags=document.getElementById('dm-team-tags');if(tags)tags.innerHTML='';
    const wrap=document.getElementById('dm-absent-wrap');if(wrap)wrap.style.display='none';
  }
  _dmLastDate = tgl;
  dmRenderCards();
  dmCheckCarry();
}

function dmOnDateChange(){
  const tgl = document.getElementById('dm-tanggal')?document.getElementById('dm-tanggal').value:'';
  if(_dmLastDate && _dmLastDate !== tgl){
    if(dmRows.some(r=>r.job.trim())){
      if(!confirm('Ganti tanggal akan mereset form. Pastikan sudah simpan data hari ini!\n\nLanjutkan?')) {
        document.getElementById('dm-tanggal').value = _dmLastDate;
        return;
      }
    }
    // Reset untuk tanggal baru
    dmRows=[];
    dmAbsent=new Set();
    for(let i=0;i<5;i++) dmRows.push(dmNewRow());
    ['dm-shift','dm-team-sel','dm-prepared','dm-notes'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
    const tags=document.getElementById('dm-team-tags');if(tags)tags.innerHTML='';
    const wrap=document.getElementById('dm-absent-wrap');if(wrap)wrap.style.display='none';
    const summary=document.getElementById('dm-summary');if(summary)summary.innerHTML='';
  }
  _dmLastDate = tgl;
  dmRenderCards();
  dmCheckCarry();
}

function dmNewRow(override={}){
  return {id:Date.now()+Math.random(),mesin:'',mesinManual:'',isManualMesin:false,job:'',problem:'',ket:'',startH:'',startM:'',stopH:'',stopM:'',kat:'',status:'',teknisi:'',isCarry:false,linkedCaseId:'',...override};
}
function dmToggleManualMesin(idx,isManual){
  dmRows[idx].isManualMesin=isManual;

}

function dmCalcDurasi(r){
  const sh=parseInt(r.startH),sm=parseInt(r.startM||0),eh=parseInt(r.stopH),em=parseInt(r.stopM||0);
  if(isNaN(sh)||isNaN(eh)||r.startH==='')return'—';
  const d=(eh*60+em)-(sh*60+sm);
  return d>0?d+'m':d===0?'0m':'—';
}
// Format menit → tampilkan hari/jam/menit secara cerdas
function fmtDurasiMnt(totalMnt){
  if(!totalMnt||totalMnt<=0) return '0m';
  const hari=Math.floor(totalMnt/1440);
  const jam=Math.floor((totalMnt%1440)/60);
  const mnt=totalMnt%60;
  const parts=[];
  if(hari>0) parts.push(hari+'h');
  if(jam>0)  parts.push(jam+'j');
  if(mnt>0||parts.length===0) parts.push(mnt+'m');
  return parts.join(' ');
}
function fmtDurasiDetail(totalMnt){
  if(!totalMnt||totalMnt<=0) return '0 menit';
  const hari=Math.floor(totalMnt/1440);
  const jam=Math.floor((totalMnt%1440)/60);
  const mnt=totalMnt%60;
  const parts=[];
  if(hari>0) parts.push(hari+' hari');
  if(jam>0)  parts.push(jam+' jam');
  if(mnt>0||parts.length===0) parts.push(mnt+' menit');
  return parts.join(' ')+' ('+totalMnt+' menit total)';
}
function parseMnt(dur){ const d=parseInt((dur||'').replace('m','')); return isNaN(d)?0:d; }
